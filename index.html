                      <input className="inp" type="text" value={form.price}
                        onChange={e=>setForm(p=>({...p,price:fmtPrice(e.target.value)}))}
                        placeholder="0,00" inputMode="decimal"
                        style={{paddingLeft:44,maxWidth:240,fontWeight:600,fontSize:"1.125rem"}} />
                    </div>
                  </Field>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <Field label="Mínimo (R$)">
                      <div style={{position:"relative"}}>
                        <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".875rem",color:"#5A5044",fontWeight:600}}>R$</span>
                        <input className="inp" type="text" value={form.priceMin}
                          onChange={e=>setForm(p=>({...p,priceMin:fmtPrice(e.target.value)}))}
                          placeholder="0,00" inputMode="decimal" style={{paddingLeft:44,fontWeight:600}} />
                      </div>
                    </Field>
                    <Field label="Máximo (R$)">
                      <div style={{position:"relative"}}>
                        <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".875rem",color:"#5A5044",fontWeight:600}}>R$</span>
                        <input className="inp" type="text" value={form.priceMax}
                          onChange={e=>setForm(p=>({...p,priceMax:fmtPrice(e.target.value)}))}
                          placeholder="0,00" inputMode="decimal" style={{paddingLeft:44,fontWeight:600}} />
                      </div>
                    </Field>
                  </div>
                )}
              </div>

              {/* Descrição */}
              <div style={{marginBottom:20}}>
                <Field label="Descrição">
                  <textarea className="inp" rows={2} value={form.description}
                    onChange={e=>setForm(p=>({...p,description:e.target.value}))}
                    placeholder="Detalhes sobre o serviço — técnica, o que está incluso, duração média..." />
                </Field>
              </div>

              {/* Fotos */}
              <div style={{background:"#fff",border:"1.5px solid #DDD5CA",borderRadius:12,padding:"20px",marginBottom:24}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".875rem",fontWeight:700,color:"#0E0C09"}}>Fotos do serviço</div>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".75rem",color:"#5A5044",marginTop:2}}>Até 5 fotos · JPG, PNG ou WebP · máx 5MB cada</div>
                  </div>
                  {(form.photos||[]).length<5&&(
                    <button onClick={()=>photoRef.current.click()} className="btn btn-ghost"
                      style={{padding:"8px 16px",borderRadius:8,fontSize:".75rem"}}>
                      📷 Adicionar
                    </button>
                  )}
                </div>

                {(form.photos||[]).length===0?(
                  <div onClick={()=>photoRef.current.click()}
                    style={{border:"2px dashed #C4BAB0",borderRadius:10,padding:"32px",textAlign:"center",cursor:"pointer",transition:"all .2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#9A6D1F";e.currentTarget.style.background="#FBF6EE";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#C4BAB0";e.currentTarget.style.background="transparent";}}>
                    <div style={{fontSize:"2rem",marginBottom:8}}>📷</div>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".875rem",color:"#3A342A",fontWeight:500}}>Arraste ou clique para adicionar fotos</div>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".75rem",color:"#5A5044",marginTop:4}}>A primeira foto será exibida como capa do serviço</div>
                  </div>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:10}}>
                    {(form.photos||[]).map((ph,phIdx)=>(
                      <div key={ph.id} style={{position:"relative",aspectRatio:"1",borderRadius:10,overflow:"hidden",
                        border:`2px solid ${phIdx===0?"#9A6D1F":"#DDD5CA"}`,
                        boxShadow:phIdx===0?"0 0 0 3px rgba(154,109,31,.2)":"none"}}>
                        <img src={ph.preview} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} />
                        {phIdx===0&&(
                          <div style={{position:"absolute",top:5,left:5,background:"#9A6D1F",color:"#fff",
                            fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".55rem",padding:"2px 7px",borderRadius:4,
                            fontWeight:700,letterSpacing:"1px"}}>CAPA</div>
                        )}
                        <div style={{position:"absolute",inset:0,background:"rgba(14,12,9,0)",display:"flex",alignItems:"flex-end",justifyContent:"center",
                          transition:"background .2s",padding:"6px",gap:4}}
                          onMouseEnter={e=>e.currentTarget.style.background="rgba(14,12,9,.55)"}
                          onMouseLeave={e=>e.currentTarget.style.background="rgba(14,12,9,0)"}>
                          <button onClick={()=>movePhoto(ph.id,-1)} disabled={phIdx===0}
                            style={{width:24,height:24,borderRadius:6,background:"rgba(255,255,255,.9)",border:"none",cursor:"pointer",
                            fontSize:".85rem",display:"flex",alignItems:"center",justifyContent:"center",opacity:phIdx===0?.3:1,fontWeight:700}}>‹</button>
                          <button onClick={()=>removePhoto(ph.id)}
                            style={{width:24,height:24,borderRadius:6,background:"rgba(168,50,32,.9)",border:"none",cursor:"pointer",
                            fontSize:".75rem",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>✕</button>
                          <button onClick={()=>movePhoto(ph.id,1)} disabled={phIdx===(form.photos||[]).length-1}
                            style={{width:24,height:24,borderRadius:6,background:"rgba(255,255,255,.9)",border:"none",cursor:"pointer",
                            fontSize:".85rem",display:"flex",alignItems:"center",justifyContent:"center",opacity:phIdx===(form.photos||[]).length-1?.3:1,fontWeight:700}}>›</button>
                        </div>
                      </div>
                    ))}
                    {(form.photos||[]).length<5&&(
                      <div onClick={()=>photoRef.current.click()}
                        style={{aspectRatio:"1",borderRadius:10,border:"2px dashed #C4BAB0",
                        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        cursor:"pointer",gap:4,transition:"all .2s"}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor="#9A6D1F";e.currentTarget.style.background="#FBF6EE";}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor="#C4BAB0";e.currentTarget.style.background="transparent";}}>
                        <span style={{fontSize:"1.3rem"}}>+</span>
                        <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:"#5A5044",fontWeight:500}}>foto</span>
                      </div>
                    )}
                  </div>
                )}
                <input ref={photoRef} type="file" accept="image/jpeg,image/png,image/webp" multiple onChange={handlePhotos} style={{display:"none"}} />
              </div>

              {/* Actions */}
              <div style={{display:"flex",gap:12}}>
                <button onClick={resetForm} className="btn btn-ghost"
                  style={{flex:1,padding:"14px",borderRadius:10,fontSize:".875rem"}}>
                  Cancelar
                </button>
                <button onClick={save} className="btn btn-primary"
                  style={{flex:2,padding:"14px",borderRadius:10,fontSize:".75rem",letterSpacing:"2px",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <span>✓</span> SALVAR SERVIÇO
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 8. PRODUCT EDITOR
    // ════════════════════════════════════════════════════════════════════════════
    function ProductEditor({products,setProducts,showToast}){
      const EMPTY={name:"",brand:"",category:"",sku:"",price:"",stock:"",description:"",photoPreview:null,id:null};
      const [adding,setAdding]=useState(false);
      const [editId,setEditId]=useState(null);
      const [form,setForm]=useState(EMPTY);
      const fileRef=useRef();
      const resetForm=()=>{setAdding(false);setEditId(null);setForm(EMPTY);};
      const edit=p=>{setForm({...p});setEditId(p.id);setAdding(true);};
      const remove=id=>setProducts(p=>p.filter(pr=>pr.id!==id));
      const handlePhoto=e=>{
        const f=e.target.files[0];if(!f)return;
        if(!ALLOWED_IMAGE_TYPES.includes(f.type)){showToast("Formato inválido","error");return;}
        if(f.size>5*1024*1024){showToast("Máx 5MB","error");return;}
        const r=new FileReader();r.onload=ev=>setForm(p=>({...p,photoPreview:ev.target.result}));r.readAsDataURL(f);
      };
      const save=()=>{
        if(!form.name||!form.price){showToast("Nome e preço obrigatórios","error");return;}
        if(editId) setProducts(p=>p.map(pr=>pr.id===editId?{...form}:pr));
        else setProducts(p=>[...p,{...form,id:uid()}]);
        resetForm(); showToast(editId?"Produto atualizado ✓":"Produto adicionado ✓","success");
      };
      return(
        <div style={{background:"#fff",border:"1px solid #DDD5CA",borderRadius:14,padding:"20px",marginBottom:20}}>
          <SectionHeader title="Produtos" icon="📦" count={products.length} onAdd={()=>{resetForm();setAdding(true);}} />
          {products.length===0&&!adding&&<EmptyState icon="📦" text="Nenhum produto ainda" sub="Adicione os produtos que você vende" />}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:adding?16:0}}>
            {products.map(p=>(
              <div key={p.id} style={{background:"#F8F5F0",borderRadius:10,border:"1px solid #DDD5CA",overflow:"hidden"}}>
                {p.photoPreview&&<div style={{height:80,overflow:"hidden"}}><img src={p.photoPreview} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}} /></div>}
                <div style={{padding:"10px"}}>
                  <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",fontWeight:500,marginBottom:2}}>{p.name}</div>
                  <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:"#5A5044",marginBottom:8}}>{p.brand&&`${p.brand} · `}R$ {parseFloat(p.price||0).toFixed(2)}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>edit(p)} className="btn" style={{flex:1,padding:"5px",borderRadius:5,border:"1px solid #DDD5CA",background:"#F8F5F0",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:"#3A342A"}}>Editar</button>
                    <button onClick={()=>remove(p.id)} className="btn" style={{flex:1,padding:"5px",borderRadius:5,border:"1px solid #F4D0C8",background:"#FFF5F3",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:"#A83220"}}>Remover</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {adding&&(
            <div className="fade-up" style={{background:"#fff",border:"1px solid #DDD5CA",borderRadius:14,padding:"20px",marginTop:8}}>
              <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",letterSpacing:"2px",color:"#5A5044",marginBottom:16}}>{editId?"EDITAR":"NOVO PRODUTO"}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <Field label="Nome *"><input className="inp" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Ex: Shampoo Hidra" /></Field>
                <Field label="Marca"><input className="inp" value={form.brand} onChange={e=>setForm(p=>({...p,brand:e.target.value}))} placeholder="Ex: L&apos;Oréal" /></Field>
                <Field label="Categoria">
                  <select className="inp" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                    <option value="">Selecione</option>
                    {PRODUCT_CATEGORIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                </Field>
                <Field label="SKU"><input className="inp" value={form.sku} onChange={e=>setForm(p=>({...p,sku:e.target.value}))} placeholder="Código interno" /></Field>
                <Field label="Preço (R$) *"><input className="inp" type="text" value={form.price} onChange={e=>setForm(p=>({...p,price:fmtPrice(e.target.value)}))} placeholder="0,00" inputMode="decimal" /></Field>
                <Field label="Estoque"><input className="inp" type="number" min="0" value={form.stock} onChange={e=>setForm(p=>({...p,stock:e.target.value}))} placeholder="0" inputMode="numeric" /></Field>
              </div>
              <Field label="Foto">
                <div onClick={()=>fileRef.current.click()} className="drop-zone" style={{padding:"16px",height:form.photoPreview?120:70,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                  {form.photoPreview
                    ?<img src={form.photoPreview} alt="preview" style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",borderRadius:8}} />
                    :<span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".75rem",color:"#5A5044"}}>📷 Clique para adicionar foto</span>
                  }
                </div>
                <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" onChange={handlePhoto} style={{display:"none"}} />
              </Field>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button onClick={resetForm} className="btn" style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #C4BAB0",background:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",color:"#3A342A"}}>Cancelar</button>
                <button onClick={save} className="btn" style={{flex:2,padding:"10px",borderRadius:8,background:"#1A5F96",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",letterSpacing:"1px"}}>SALVAR</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 9. ADMIN PANEL (melhoria 4.2)
    // ════════════════════════════════════════════════════════════════════════════
    const STATUS_META = {
      pending_review:{ label:"Aguardando", color:"#C9A96E", bg:"#FFF8ED" },
      approved:      { label:"Aprovado",   color:"#5BAA5B", bg:"#F0FFF0" },
      rejected:      { label:"Rejeitado",  color:"#D4735A", bg:"#FFF5F3" },
      blocked:       { label:"Bloqueado",  color:"#9A3030", bg:"#FFF0F0" },
    };

    function AdminPanel({onBack, currentUser}){
      const [isAdmin,  setIsAdmin]  = useState(null); // null=checking, true/false
      const [filter,  setFilter]  = useState("pending_review");
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [sel,     setSel]     = useState(null);
      const [note,    setNote]    = useState("");
      const [busy,    setBusy]    = useState(false);
      const [counts,  setCounts]  = useState({});
      const [toast,   setToast]   = useState(null);

      const toast2 = (msg,type="info")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

      // Verifica se usuário é admin na coleção Firestore (melhoria 4.2)
      useEffect(()=>{
        if (!currentUser) { setIsAdmin(false); return; }
        db.collection("admins").doc(currentUser.uid).get()
          .then(snap=>setIsAdmin(snap.exists))
          .catch(()=>setIsAdmin(false));
      },[currentUser]);

      // Enquanto verifica, mostra loading
      if (isAdmin === null) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F8F6F2"}}>
          <div style={{width:32,height:32,border:"3px solid #EDE9E2",borderTopColor:"#C9A96E",borderRadius:"50%",animation:"spin .7s linear infinite"}} />
        </div>
      );

      // Se não é admin, nega acesso
      if (isAdmin === false) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F8F6F2",gap:16,textAlign:"center",padding:24}}>
          <div style={{fontSize:"3rem"}}>🔒</div>
          <div style={{fontFamily:"'Lora',Georgia,serif",fontSize:"1.6rem",color:"#1A1715"}}>Acesso negado</div>
          <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".82rem",color:"#9A9288",maxWidth:320}}>Sua conta não tem permissão de administrador. Entre em contato com o suporte.</div>
          <button onClick={onBack} className="btn" style={{padding:"10px 24px",borderRadius:8,background:"#1A1715",color:"#fff",fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".78rem",marginTop:8}}>← Voltar</button>
        </div>
      );

      useEffect(()=>{
        setLoading(true);
        const unsub = db.collection("establishments")
          .where("status","==",filter)
          .onSnapshot(snap=>{
            // Ordenação client-side para evitar exigir índice composto no Firestore
            const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
            docs.sort((a,b)=>{
              const ta = a.createdAt?.toMillis?.() ?? 0;
              const tb = b.createdAt?.toMillis?.() ?? 0;
              return tb - ta;
            });
            setItems(docs);
            setLoading(false);
          },()=>setLoading(false));
        return unsub;
      },[filter]);

      useEffect(()=>{
        const unsubs = Object.keys(STATUS_META).map(s=>{
          return db.collection("establishments").where("status","==",s)
            .onSnapshot(snap=>setCounts(p=>({...p,[s]:snap.size})));
        });
        return ()=>unsubs.forEach(u=>u());
      },[]);

      const doAction = async(newStatus)=>{
        if(!sel)return; setBusy(true);
        try {
          await db.collection("establishments").doc(sel.id).update({
            status:newStatus, rejectReason:note||null,
            reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),
          });
          toast2(`${sel.businessName} → ${STATUS_META[newStatus].label}`,"success");
          setSel(null); setNote("");
        } catch { toast2("Erro ao atualizar","error"); } finally { setBusy(false); }
      };

      return (
        <div style={{display:"flex",minHeight:"100vh",background:"#F8F5F0"}}>
          {/* Sidebar */}
          <aside style={{width:220,background:"#fff",borderRight:"1px solid #DDD5CA",padding:"24px 16px",position:"sticky",top:0,height:"100vh",overflowY:"auto",flexShrink:0}}>
            <div style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.3rem",display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              Beleza <em style={{color:"#9A6D1F"}}>Já</em>
              <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".55rem",letterSpacing:"2px",background:"#0E0C09",color:"#9A6D1F",padding:"2px 7px",borderRadius:4}}>ADMIN</span>
            </div>
            <button onClick={onBack} className="btn" style={{marginBottom:24,fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".68rem",color:"#5A5044",background:"transparent",padding:"4px 0"}}>← Voltar</button>
            {Object.entries(STATUS_META).map(([s,m])=>(
              <button key={s} onClick={()=>{setFilter(s);setSel(null);}} className="btn" style={{
                width:"100%",padding:"10px 12px",borderRadius:8,
                display:"flex",alignItems:"center",gap:8,fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",
                background:filter===s?"#F8F5F0":"transparent",color:"#0E0C09",
                marginBottom:4,textAlign:"left",
                borderLeft:`3px solid ${filter===s?m.color:"transparent"}`,
              }}>
                <span style={{flex:1}}>{m.label}</span>
                <span style={{fontSize:".65rem",padding:"2px 8px",borderRadius:10,background:m.bg,color:m.color,fontWeight:600}}>{counts[s]??"—"}</span>
              </button>
            ))}
          </aside>

          {/* List */}
          <main style={{flex:1,padding:"32px",minWidth:0}}>
            <h1 style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.8rem",fontWeight:300,marginBottom:24,display:"flex",alignItems:"center",gap:10}}>
              {STATUS_META[filter].label}
              <span style={{fontSize:".65rem",padding:"3px 10px",borderRadius:10,background:STATUS_META[filter].bg,color:STATUS_META[filter].color,fontWeight:600}}>{counts[filter]??0}</span>
            </h1>
            {loading?<div style={{textAlign:"center",padding:60}}><div style={{width:32,height:32,border:"3px solid #EDE9E2",borderTopColor:"#C9A96E",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto"}} /></div>
            :items.length===0?<div style={{textAlign:"center",padding:"60px 24px",color:"#5A5044"}}>
                <div style={{fontSize:"2.5rem",marginBottom:12}}>📭</div>
                <div style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.2rem"}}>Nenhum cadastro {STATUS_META[filter].label.toLowerCase()}</div>
              </div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {items.map(item=>(
                <div key={item.id} onClick={()=>setSel(s=>s?.id===item.id?null:item)} style={{
                  background:sel?.id===item.id?"#FBF6EE":"#fff",
                  border:`1px solid ${sel?.id===item.id?"#C9A96E":"#EDE9E2"}`,
                  borderRadius:12,padding:"16px 20px",cursor:"pointer",transition:"all .18s",
                  boxShadow:sel?.id===item.id?"0 0 0 3px rgba(201,169,110,.15)":"none",
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.1rem",marginBottom:2}}>{item.businessName||"—"}</div>
                      <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".68rem",color:"#5A5044"}}>{item.cnpj} · {item.city}/{item.state}</div>
                    </div>
                    <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",padding:"3px 10px",borderRadius:12,background:STATUS_META[item.status]?.bg,color:STATUS_META[item.status]?.color,fontWeight:600,whiteSpace:"nowrap"}}>
                      {STATUS_META[item.status]?.label}
                    </span>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    {item.cnpjVerified&&<span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"#1E6B22",border:"1px solid #5BAA5B30"}}>CNPJ ✓</span>}
                    {item.emailVerified&&<span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"#1E6B22",border:"1px solid #5BAA5B30"}}>E-mail ✓</span>}
                    {item.phoneVerified&&<span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"#1E6B22",border:"1px solid #5BAA5B30"}}>Tel ✓</span>}

                {t:"Endereço",rows:[["CEP",sel.cep],["Rua",`${sel.street||""}, ${sel.number||""}`],["Cidade",`${sel.city||""}/${sel.state||""}`]]},

    // ════════════════════════════════════════════════════════════════════════════
    // LOGIN MODAL
    // ════════════════════════════════════════════════════════════════════════════
    function LoginModal({ onClose, showToast, onSuccess }) {
      const [email,    setEmail]    = useState("");
      const [password, setPassword] = useState("");
      const [showPw,   setShowPw]   = useState(false);
      const [loading,  setLoading]  = useState(false);
      const [mode,     setMode]     = useState("login"); // "login" | "reset"
      const [resetSent,setResetSent]= useState(false);

      const doLogin = async () => {
        if (!email || !password) { showToast("Preencha e-mail e senha","error"); return; }
        setLoading(true);
        try {
          await auth.signInWithEmailAndPassword(email, password);
          showToast("Login realizado ✓","success");
          onSuccess?.();
          onClose();
        } catch(err) {
          if (err.code==="auth/user-not-found"||err.code==="auth/wrong-password"||err.code==="auth/invalid-credential")
            showToast("E-mail ou senha incorretos","error");
          else if (err.code==="auth/too-many-requests")
            showToast("Muitas tentativas. Aguarde alguns minutos.","error");
          else showToast("Erro ao fazer login","error");
        } finally { setLoading(false); }
      };

      const doReset = async () => {
        if (!email) { showToast("Digite seu e-mail primeiro","error"); return; }
        setLoading(true);
        try {
          await auth.sendPasswordResetEmail(email);
          setResetSent(true);
          showToast("E-mail de redefinição enviado ✓","success");
        } catch { showToast("Erro ao enviar e-mail","error"); }
        finally { setLoading(false); }
      };

      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(26,23,21,.7)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} className="fade-up" style={{background:"#fff",borderRadius:16,padding:"32px 28px",width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,.3)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.5rem",fontWeight:300}}>
                {mode==="reset" ? "Redefinir senha" : "Entrar na conta"}
              </div>
              <button onClick={onClose} className="btn" style={{background:"transparent",border:"1px solid #DDD5CA",borderRadius:8,padding:"4px 10px",color:"#5A5044",fontSize:".85rem"}}>✕</button>
            </div>
            {mode==="reset" && resetSent ? (
              <div style={{textAlign:"center",padding:"16px 0"}}>
                <div style={{fontSize:"2rem",marginBottom:12}}>📧</div>
                <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".82rem",color:"#3A342A",lineHeight:1.7}}>
                  Enviamos um link para <strong>{email}</strong>.<br/>Verifique sua caixa de entrada.
                </div>
                <button onClick={()=>{setMode("login");setResetSent(false);}} className="btn" style={{marginTop:20,padding:"9px 24px",borderRadius:8,background:"#0E0C09",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem"}}>← Voltar ao login</button>
              </div>
            ) : (
              <>
                <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:20}}>
                  <div>
                    <label style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#3A342A",display:"block",marginBottom:6}}>E-mail</label>
                    <input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():doReset())} placeholder="seu@email.com" autoFocus />
                  </div>
                  {mode==="login" && (
                    <div>
                      <label style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#3A342A",display:"block",marginBottom:6}}>Senha</label>
                      <div className="pass-wrap">
                        <input className="inp" type={showPw?"text":"password"} autoComplete="current-password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="Sua senha" style={{paddingRight:36}} />
                        <span className="pass-eye" onClick={()=>setShowPw(p=>!p)}>{showPw?"🙈":"👁️"}</span>
                      </div>
                    </div>
                  )}
                </div>
                <button onClick={mode==="login"?doLogin:doReset} disabled={loading} className="btn" style={{width:"100%",padding:"12px",borderRadius:8,background:"#9A6D1F",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".82rem",letterSpacing:"1.5px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {loading&&<span className="spinner" />}
                  {mode==="login" ? "ENTRAR" : "ENVIAR LINK"}
                </button>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
                  {mode==="login" ? (
                    <button onClick={()=>setMode("reset")} className="btn" style={{background:"transparent",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#5A5044",padding:0}}>Esqueci a senha</button>
                  ) : (
                    <button onClick={()=>setMode("login")} className="btn" style={{background:"transparent",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#5A5044",padding:0}}>← Voltar</button>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // 10. SEARCH SCREEN — tela inicial de busca de salões
    // ════════════════════════════════════════════════════════════════════════════
    const SAMPLE_SALONS = [
      { id:"s1", name:"Studio Âmbar", type:"Salão de Beleza", city:"São Paulo", state:"SP", services:["Corte","Escova","Coloração"], rating:4.9, reviews:128, verified:true, color:"#C9A96E" },
      { id:"s2", name:"Barbearia Ferro & Arte", type:"Barbearia", city:"Rio de Janeiro", state:"RJ", services:["Corte masculino","Barba","Navalhado"], rating:4.8, reviews:94, verified:true, color:"#79B8D4" },
      { id:"s3", name:"Espaço Lumière", type:"Salão + Estética", city:"Belo Horizonte", state:"MG", services:["Manicure","Pedicure","Skincare"], rating:4.7, reviews:67, verified:true, color:"#A67FC4" },
      { id:"s4", name:"Beleza Nativa", type:"Salão de Beleza", city:"Curitiba", state:"PR", services:["Escova","Progressiva","Mechas"], rating:4.6, reviews:53, verified:false, color:"#5BAA5B" },
      { id:"s5", name:"Hair Lab São Paulo", type:"Coloração Especializada", city:"São Paulo", state:"SP", services:["Coloração","Mechas","Ombré"], rating:5.0, reviews:42, verified:true, color:"#D4735A" },
      { id:"s6", name:"Nail Studio Premium", type:"Esmalteria", city:"Porto Alegre", state:"RS", services:["Gel","Fibra","Nail art"], rating:4.8, reviews:81, verified:true, color:"#C9A96E" },
    ];

    const SERVICE_FILTERS = ["Todos","Cabelo","Unhas","Estética","Barba","Massagem","Depilação"];

    function SearchScreen({ onRegister, onLanding, showToast, authUser, hasDraft, onRestoreDraft }) {
      const [query,      setQuery]      = useState("");
      const [cityFilter, setCityFilter] = useState("");
      const [svcFilter,  setSvcFilter]  = useState("Todos");
      const [salons,     setSalons]     = useState(SAMPLE_SALONS);
      const [loading,    setLoading]    = useState(false);
      const [searched,   setSearched]   = useState(false);
      const [selected,   setSelected]   = useState(null);
      const [sortBy,     setSortBy]     = useState("rating"); // "rating"|"name"|"newest"
      const [page,       setPage]       = useState(1);
      const PAGE_SIZE = 9;

      const doSearch = (overrideFilter) => {
        const activeFilter = overrideFilter !== undefined ? overrideFilter : svcFilter;
        setLoading(true);
        setSelected(null);
        const q = query.toLowerCase().trim();
        const c = cityFilter.toLowerCase().trim();
        const searchInSource = (source) => source.filter(s => {
          const matchQ = !q || s.name.toLowerCase().includes(q) || s.type.toLowerCase().includes(q) || (s.services||[]).some(sv => sv.toLowerCase().includes(q)) || (s.description||"").toLowerCase().includes(q);
          const matchC = !c || (s.city||"").toLowerCase().includes(c) || (s.state||"").toLowerCase().includes(c);
          const matchS = activeFilter === "Todos" || (s.services||[]).some(sv => sv.toLowerCase().includes(activeFilter.toLowerCase())) || (s.type||"").toLowerCase().includes(activeFilter.toLowerCase());
          return matchQ && matchC && matchS;
        });
        // FIX: sem setTimeout — loading não fica preso se exceção ocorrer
        db.collection("establishments").where("status","==","approved").limit(50).get()
          .then(snap => {
            const real = snap.docs.map(d => ({id:d.id, ...d.data(), verified:true}));
            const merged = [...real, ...SAMPLE_SALONS.filter(s => !real.find(r => r.id===s.id))];
            setSalons(searchInSource(merged));
          })
          .catch(() => setSalons(searchInSource(SAMPLE_SALONS)))
          .finally(() => { setLoading(false); setSearched(true); });
      };

      const stars = n => "★".repeat(Math.floor(n)) + (n % 1 >= 0.5 ? "½" : "") + "☆".repeat(5 - Math.ceil(n));

      // Computed sort + pagination (moved out of JSX to avoid IIFE syntax issues)
      const sortedSalons = [...salons].sort((a,b)=>{
        if(sortBy==="rating") return (b.rating||0)-(a.rating||0);
        if(sortBy==="name") return (a.name||"").localeCompare(b.name||"","pt-BR");
        if(sortBy==="newest") return (b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0);
        return 0;
      });
      const pagedSalons = sortedSalons.slice(0, page*PAGE_SIZE);
      const hasMore = sortedSalons.length > pagedSalons.length;

      return (
        <div style={{minHeight:"calc(100vh - 60px)"}}>
          {/* Hero premium */}
          <div className="hero">
            <div className="hero-inner">
              <span className="hero-eyebrow">ENCONTRE SEU SALÃO IDEAL</span>
              <h1 className="hero-h1">
                Beleza que você <em>merece</em>
              </h1>
              <p className="hero-sub">
                Encontre salões verificados, agende online e garanta seu horário com segurança.
              </p>
              {/* Search bar premium */}
              <div className="search-bar">
                <div className="search-bar-row">
                  <span className="search-icon">🔍</span>
                  <input
                    className="search-input-main"
                    value={query}
                    onChange={e=>setQuery(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&doSearch()}
                    placeholder="Salão, serviço ou especialidade..."
                  />
                  <div className="search-divider" />
                  <input
                    className="search-city-input"
                    value={cityFilter}
                    onChange={e=>setCityFilter(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&doSearch()}
                    placeholder="Cidade ou estado"
                  />
                  <button onClick={doSearch} className="search-cta">Buscar</button>
                </div>
                <div className="search-filters-row">
                  {SERVICE_FILTERS.map(f=>(
                    <button key={f} onClick={()=>{setSvcFilter(f); doSearch(f);}}
                      className={`filter-chip${svcFilter===f?" active":""}`}>
                      {f}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Results */}
          <div style={{maxWidth:900,margin:"0 auto",padding:"32px 24px"}}>
            {/* Continue registration banner */}
            {authUser&&hasDraft&&(
              <div className="fade-up" style={{background:"#FFF8ED",border:"1px solid #F0D99A",borderRadius:10,padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",color:"#7A6020"}}>☁️ Você tem um cadastro em andamento. Continuar de onde parou?</span>
                <button onClick={onRestoreDraft} className="btn" style={{padding:"6px 16px",borderRadius:6,background:"#9A6D1F",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".75rem",whiteSpace:"nowrap"}}>Continuar cadastro</button>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
              <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#5A5044",letterSpacing:"2px"}}>
                {loading ? "BUSCANDO..." : searched ? `${salons.length} RESULTADO${salons.length!==1?"S":""} ENCONTRADO${salons.length!==1?"S":""}` : "DESTAQUES"}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <select value={sortBy} onChange={e=>{setSortBy(e.target.value);setPage(1);}} style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".68rem",border:"1px solid #C4BAB0",borderRadius:6,padding:"5px 10px",background:"#fff",color:"#0E0C09",outline:"none"}}>
                  <option value="rating">Melhor avaliação</option>
                  <option value="name">Nome A–Z</option>
                  <option value="newest">Mais recentes</option>
                </select>
                <button onClick={onRegister} className="btn" style={{padding:"7px 16px",borderRadius:8,background:"#0E0C09",color:"#F7F5F0",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".68rem",letterSpacing:"1.5px"}}>
                  + CADASTRAR MEU SALÃO
                </button>
              </div>
            </div>

            {loading && (
              <div className="salon-grid">
                {[1,2,3,4,5,6].map(i=>(
                  <div key={i} className="skel-card">
                    <div className="skel-accent skeleton" />
                    <div className="skel-body">
                      <div className="skeleton sk sk-h" style={{width:"65%",marginBottom:8}} />
                      <div className="skeleton sk sk-s" style={{width:"45%",marginBottom:16}} />
                      <div className="skeleton sk sk-xs" style={{width:"85%",marginBottom:6}} />
                      <div className="skeleton sk sk-xs" style={{width:"55%",marginBottom:14}} />
                      <div style={{display:"flex",gap:6}}>
                        {[1,2,3].map(j=>(<div key={j} className="skeleton sk sk-xs" style={{width:56,borderRadius:10}} />))}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {!loading && salons.length === 0 && searched && (
              <div style={{textAlign:"center",padding:"64px 24px"}}>
                <div style={{fontSize:"2.5rem",marginBottom:12}}>🔍</div>
                <div style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.4rem",color:"#3A342A",marginBottom:8}}>Nenhum resultado encontrado</div>
                <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",color:"#5A5044",marginBottom:24}}>Tente outros termos ou seja o primeiro a cadastrar nessa região.</div>
                <button onClick={onRegister} className="btn" style={{padding:"11px 28px",borderRadius:8,background:"#9A6D1F",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".8rem",letterSpacing:"2px"}}>CADASTRAR MEU SALÃO</button>
              </div>
            )}

            {!loading && salons.length > 0 && (
              <>
              <div className="salon-grid">
                {pagedSalons.map((s,i)=>(
                  <div key={s.id}
                    className={`sc fade-up${selected?.id===s.id?" sel":""}`}
                    onClick={()=>setSelected(sel=>sel?.id===s.id?null:s)}
                    style={{animationDelay:`${i*.055}s`}}>
                    <div className="sc-accent" style={{background:s.color}} />
                    <div className="sc-body">
                      <div className="sc-header">
                        <div>
                          <div className="sc-name">{s.name}</div>
                          <div className="sc-type">{s.type}</div>
                        </div>
                        {s.verified && <span className="sc-verified">✓ Verificado</span>}
                      </div>
                      <div className="sc-rating">
                        {stars(s.rating)}
                        <span className="sc-rating-count">{s.rating} · {s.reviews} avaliações</span>
                      </div>
                      <div className="sc-location">📍 {s.city}, {s.state}</div>
                      <div className="sc-tags">
                        {(s.services||[]).slice(0,4).map(sv=>(
                          <span key={sv} className="sc-tag">{sv}</span>
                        ))}
                      </div>
                    </div>
                    {selected?.id===s.id && (
                      <div className="sc-footer fade-up">
                        <button className="sc-btn sc-btn-gold"
                          onClick={e=>{e.stopPropagation();showToast("Perfil completo em breve! 🌿","info");}}>
                          Ver perfil
                        </button>
                        <button className="sc-btn sc-btn-outline"
                          onClick={e=>{e.stopPropagation();showToast("Agendamento online em breve! 📅","info");}}>
                          Agendar
                        </button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {hasMore && (
                <div style={{textAlign:"center",marginTop:16}}>
                  <button onClick={()=>setPage(p=>p+1)} className="btn" style={{padding:"10px 32px",borderRadius:8,border:"1px solid #C4BAB0",background:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",color:"#3A342A"}}>
                    Ver mais {Math.min(PAGE_SIZE, sortedSalons.length-pagedSalons.length)} salões
                  </button>
                </div>
              )}
              </>
            )}

            {/* CTA premium */}
            <div className="cta-band">
              <div className="cta-inner">
                <div className="cta-title">Seu salão ainda não está aqui?</div>

                  Cadastre-se gratuitamente, apareça para milhares de clientes<br/>

    // ════════════════════════════════════════════════════════════════════════════
    // 10. MAIN APP
    // ════════════════════════════════════════════════════════════════════════════
    function App(){
      const [screen,          setScreen]        = useState("search");
      const [accountType,     setAccountType]   = useState(null);
      const [step,            setStep]          = useState(1);
      const [formData,        dispatch]         = useReducer(formReducer, INITIAL_FORM);
      const [services,        setServices]      = useState([]);
      const [products,        setProducts]      = useState([]);
      const [errors,          setErrors]        = useState({});
      const [verifyingCNPJ,   setVerifyingCNPJ] = useState(false);
      const [cnpjData,        setCnpjData]      = useState(null);
      const [cnpjError,       setCnpjError]     = useState("");
      const [cnpjSuggestions, setCnpjSugg]     = useState([]);  // melhoria 3.3
      const [cnpjCooldown,    setCnpjCooldown]  = useState(false); // Fix #11: rate limit
      const [sendingCode,     setSendingCode]   = useState(false);
      const [logoPreview,     setLogoPreview]   = useState(null);
      const [coverPreview,    setCoverPreview]  = useState(null);
      const [salonPhotos,     setSalonPhotos]   = useState([]);
      const [toast,           setToast]         = useState(null);
      const [securityScore,   setSecurityScore] = useState(0);
      const [showPass,        setShowPass]      = useState(false);
      const [showCPass,       setShowCPass]     = useState(false);
      const [stepDir,         setStepDir]       = useState(1);
      const [isSubmitting,    setIsSubmitting]  = useState(false);
      const [authUser,        setAuthUser]      = useState(null);
      const [authLoading,     setAuthLoading]   = useState(true);
      const [draftLoading,    setDraftLoading]  = useState(false);
      const [hasDraft,        setHasDraft]      = useState(false);
      const [saveStatus,      setSaveStatus]    = useState("");
      const [showAdmin,       setShowAdmin]     = useState(false);
      const [showLogin,       setShowLogin]     = useState(false);

      const prevDataRef  = useRef({});
      const toastTimer   = useRef(null);
      const saveTimer    = useRef(null);
      const protocolRef  = useRef(null);
      const prevCEP      = useRef("");

      // ── Toast ──────────────────────────────────────────────────────────────
      const showToast = useCallback((msg,type="info")=>{
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({msg,type});
        toastTimer.current = setTimeout(()=>setToast(null),3500);
      },[]);
      useEffect(()=>()=>{
        if(toastTimer.current) clearTimeout(toastTimer.current);
        if(saveTimer.current)  clearTimeout(saveTimer.current);
      },[]);

      const set = useCallback((key,val)=>dispatch({key,val}),[]);

      // ── Firebase Auth ──────────────────────────────────────────────────────
      useEffect(()=>{
        const unsub = auth.onAuthStateChanged(user=>{
          setAuthUser(user);
          setAuthLoading(false);
          removeLoader(); // remove loading screen quando auth estiver pronto
          if (user) {
            setDraftLoading(true);
            loadDraftFS(user.uid)
              .then(draft=>{ if(draft&&Object.keys(draft).some(k=>draft[k])) setHasDraft(true); })
              .catch(()=>{})
              .finally(()=>setDraftLoading(false));
          }
        });
        return unsub;
      },[]);

      // ── Progresso por campos (melhoria 3.1) ───────────────────────────────
      const progress = useMemo(()=>calcProgress(formData),[formData]);

      // ── Galeria de fotos do salão ──────────────────────────────────────────────
    function GalleryUpload({ photos, setPhotos, userId, showToast }) {
      const MAX_PHOTOS = 10;
      const fileRef = useRef();

      const handleFiles = (files) => {
        const valid = Array.from(files).filter(f => {
          if (!ALLOWED_IMAGE_TYPES.includes(f.type)) { showToast("Formato inválido. Use JPG, PNG ou WebP.", "error"); return false; }
          if (f.size > 8 * 1024 * 1024) { showToast("Imagem muito grande. Máximo 8MB.", "error"); return false; }
          return true;
        });
        if (photos.length + valid.length > MAX_PHOTOS) {
          showToast(`Máximo de ${MAX_PHOTOS} fotos permitidas.`, "error");
          valid.splice(MAX_PHOTOS - photos.length);
        }
        valid.forEach(f => {
          const id = uid();
          const reader = new FileReader();
          reader.onload = ev => {
            setPhotos(prev => [...prev, { id, preview: ev.target.result, file: f, uploading: false, url: null, error: null }]);
          };
          reader.readAsDataURL(f);
        });
      };

      const handleDrop = e => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
      const handleDragOver = e => e.preventDefault();

      const removePhoto = id => setPhotos(prev => prev.filter(p => p.id !== id));

      const movePhoto = (id, dir) => {
        setPhotos(prev => {
          const arr = [...prev];
          const idx = arr.findIndex(p => p.id === id);
          const to = idx + dir;
          if (to < 0 || to >= arr.length) return arr;
          [arr[idx], arr[to]] = [arr[to], arr[idx]];
          return arr;
        });
      };

      return (
        <div>
          {/* Drop zone */}
          {photos.length < MAX_PHOTOS && (
            <div
              className="drop-zone"
              style={{ padding: "24px", textAlign: "center", marginBottom: 12, cursor: "pointer" }}
              onClick={() => fileRef.current.click()}
              onDrop={handleDrop}
              onDragOver={handleDragOver}
            >
              <div style={{ fontSize: "1.6rem", marginBottom: 6 }}>📷</div>
              <div style={{ fontFamily: "'Plus Jakarta Sans', system-ui, sans-serif", fontSize: ".75rem", color: "#5A5044", marginBottom: 2 }}>
                Arraste fotos ou clique para selecionar
              </div>
              <div style={{ fontFamily: "'Plus Jakarta Sans', system-ui, sans-serif", fontSize: ".65rem", color: "#B0A898" }}>
                JPG · PNG · WebP · máx 8MB por foto · até {MAX_PHOTOS} fotos
              </div>
              <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" multiple onChange={e => handleFiles(e.target.files)} style={{ display: "none" }} />
            </div>
          )}

          {/* Grid de previews */}
          {photos.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(100px,1fr))", gap: 8 }}>
              {photos.map((p, idx) => (
                <div key={p.id} style={{ position: "relative", borderRadius: 8, overflow: "hidden", border: "1px solid #DDD5CA", aspectRatio: "1", background: "#F0EDE8" }}>
                  <img src={p.preview} alt={`foto-${idx+1}`} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  {/* Badge posição */}
                  {idx === 0 && (
                    <div style={{ position: "absolute", top: 4, left: 4, background: "#9A6D1F", color: "#fff", fontFamily: "'Plus Jakarta Sans', system-ui, sans-serif", fontSize: ".55rem", padding: "2px 6px", borderRadius: 6, letterSpacing: "1px" }}>CAPA</div>
                  )}
                  {/* Botões de controle */}
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, display: "flex", background: "rgba(26,23,21,.65)", padding: "4px" }}>
                    <button onClick={() => movePhoto(p.id, -1)} disabled={idx === 0} style={{ flex: 1, background: "transparent", border: "none", color: "#fff", cursor: "pointer", fontSize: ".75rem", opacity: idx === 0 ? 0.3 : 1 }}>‹</button>
                    <button onClick={() => removePhoto(p.id)} style={{ flex: 1, background: "transparent", border: "none", color: "#F4A08A", cursor: "pointer", fontSize: ".75rem" }}>✕</button>
                    <button onClick={() => movePhoto(p.id, 1)} disabled={idx === photos.length - 1} style={{ flex: 1, background: "transparent", border: "none", color: "#fff", cursor: "pointer", fontSize: ".75rem", opacity: idx === photos.length - 1 ? 0.3 : 1 }}>›</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {photos.length > 0 && (
            <div style={{ fontFamily: "'Plus Jakarta Sans', system-ui, sans-serif", fontSize: ".65rem", color: "#5A5044", marginTop: 8, textAlign: "center" }}>
              {photos.length}/{MAX_PHOTOS} fotos · A primeira foto é usada como capa · Use ‹ › para reordenar
            </div>
          )}
        </div>
      );
    }
      const isFirstRender = useRef(true);
      useEffect(()=>{
        if (!authUser) return;
        if (isFirstRender.current) {
          isFirstRender.current = false;
          prevDataRef.current = {...formData};
          return;
        }
        const changed = {};
        for (const [k,v] of Object.entries(formData)) {
          if (prevDataRef.current[k] !== v) changed[k] = v;
        }
        prevDataRef.current = {...formData};
        if (Object.keys(changed).length === 0) return;

        if (saveTimer.current) clearTimeout(saveTimer.current);
        setSaveStatus("saving");
        saveTimer.current = setTimeout(async()=>{
          try {
            // Fix #5: unifica em uma única chamada set para evitar race condition
            const clean = cleanData({...changed});
            if (Object.keys(clean).length > 0) {
              await db.collection("drafts").doc(authUser.uid).set(
                {
                  ...clean,
                  _services: services.map(s=>({...s, photos: stripBase64(s.photos||[])})),
                  _products: products,
                  _salonPhotos: stripBase64(salonPhotos),
                  _updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                },
                { merge: true }
              );
            }
            setSaveStatus("saved"); setTimeout(()=>setSaveStatus(""),2000);
          }
          catch(err) { setSaveStatus("error"); setTimeout(()=>setSaveStatus(""),3000); }
        },1500);

        // Fix #9: cleanup do timer ao desmontar para evitar state update em componente morto
        return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
      },[formData,authUser,services,products,salonPhotos]);

      // ── Security score ─────────────────────────────────────────────────────
      useEffect(()=>{
        let s=0;
        if(formData.cnpjVerified)  s+=20;
        if(formData.emailVerified) s+=15;
        if(formData.phoneVerified) s+=15;
        if(formData.ownerDoc||formData.ownerDocUrl) s+=25;
        if(formData.addressProof||formData.addressProofUrl) s+=25;
        setSecurityScore(s);
      },[formData.cnpjVerified,formData.emailVerified,formData.phoneVerified,formData.ownerDoc,formData.ownerDocUrl,formData.addressProof,formData.addressProofUrl]);

      // ── CEP autocomplete ───────────────────────────────────────────────────
      useEffect(()=>{
        const raw = formData.cep.replace(/\D/g,"");
        if (raw.length===8&&raw!==prevCEP.current) {
          prevCEP.current=raw;
          const _cepCtrl = new AbortController();
          const _cepTimer = setTimeout(() => _cepCtrl.abort(), 8000);
          fetch(`https://viacep.com.br/ws/${raw}/json/`, { signal: _cepCtrl.signal })
            .then(r => { clearTimeout(_cepTimer); if(!r.ok) throw new Error("cep_error"); return r.json(); })
            .then(d => { if(d.erro) return; set("street",d.logradouro||""); set("neighborhood",d.bairro||""); set("city",d.localidade||""); set("state",d.uf||""); showToast("Endereço preenchido ✓","success"); })
            .catch(e => { clearTimeout(_cepTimer); if(e.name!=="AbortError") console.warn("[CEP]", e.message); });
        }
      },[formData.cep]);

      // ── CNPJ verify (melhoria 3.2 + 3.3) ──────────────────────────────────
      const verifyCNPJ = async()=>{
        if (!validateCNPJ(formData.cnpj)) { showToast("CNPJ inválido","error"); return; }
        if (cnpjCooldown) { showToast("Aguarde antes de consultar novamente","error"); return; }
        setVerifyingCNPJ(true); setCnpjError(""); setCnpjData(null); setCnpjSugg([]);
        try {
          const data = await fetchCNPJ(formData.cnpj);
          setCnpjData(data);
          set("cnpjVerified",true);
          // Pré-preenchimento inteligente (melhoria 3.2)
          if (!formData.businessName && data.razao_social) set("businessName",data.razao_social);
          if (!formData.tradeName && data.nome_fantasia)    set("tradeName",data.nome_fantasia);
          if (data.cep)       { set("cep",fmtCEP(data.cep.replace(/\D/g,""))); }
          if (data.logradouro)set("street",data.logradouro);
          if (data.numero)    set("number",data.numero);
          if (data.bairro)    set("neighborhood",data.bairro);
          if (data.municipio?.descricao) set("city",data.municipio.descricao);
          if (data.municipio?.uf)        set("state",data.municipio.uf);
          // Sugestão de serviços (melhoria 3.3)
          const sugg = suggestByCNAE(data.cnae_fiscal_principal?.descricao||"");
          setCnpjSugg(sugg);
          showToast("CNPJ verificado ✓"+(sugg.length?` · ${sugg.length} serviços sugeridos`:""),"success");
        } catch(err) {
          if (err.message==="not_found")           { setCnpjError("CNPJ não encontrado na Receita Federal"); showToast("CNPJ não encontrado","error"); }
          else if (err.message==="rate_limit")     { setCnpjError("API da Receita Federal sobrecarregada. Aguarde 1 minuto e tente novamente."); showToast("Limite de consultas atingido — aguarde","error"); }
          else if (err.message?.startsWith("inactive:")) { setCnpjError(`CNPJ ${err.message.split(":")[1]} na Receita Federal`); showToast("CNPJ não está ativo","error"); }
          else { setCnpjError("API da Receita Federal indisponível. Tente novamente mais tarde."); showToast("API indisponível — tente novamente","error"); }
        } finally {
          setVerifyingCNPJ(false);
          // Fix #11: cooldown de 60s para evitar rate limit na API da Receita Federal
          setCnpjCooldown(true);
          setTimeout(()=>setCnpjCooldown(false), 60000);
        }
      };

      // ── OTP (melhoria 1.3) ─────────────────────────────────────────────────
      const sendVerification = async(type)=>{
        setSendingCode(true);
        try {
          const idToken = authUser ? await authUser.getIdToken() : null;
          const target  = type==="email" ? formData.email : formData.phone;
          const result  = await sendOTP(type, target, authUser?.uid||"demo", idToken);
          if (result?.demo) {
            showToast(`[DEMO] Código: ${result.otp} — configure EmailJS/Cloud Function para envio real`,"info");
          } else {
            showToast(`Código enviado para ${target}`,"success");
          }
        } catch(err) { showToast(err.message||"Erro ao enviar código","error"); }
        finally { setSendingCode(false); }
      };

      const checkCode = async(type)=>{
        const code   = type==="email"?formData.emailCode:formData.phoneCode;
        const target = type==="email"?formData.email:formData.phone;
        if (CLOUD_FN_URL && authUser) {
          const idToken = await authUser.getIdToken();
          const ok = await verifyOTPCloud(type, authUser.uid, code, idToken);
          if (ok) { set(type==="email"?"emailVerified":"phoneVerified",true); showToast(`${type==="email"?"E-mail":"Telefone"} verificado ✓`,"success"); }
          else showToast("Código incorreto ou expirado","error");
        } else {
          const ok = verifyOTPLocal(type, authUser?.uid||"demo", code, target);
          if (ok) { set(type==="email"?"emailVerified":"phoneVerified",true); showToast(`${type==="email"?"E-mail":"Telefone"} verificado ✓`,"success"); }
          else showToast("Código incorreto","error");
        }
      };

      // ── Navigation ─────────────────────────────────────────────────────────
      const goToStep = n=>{
        if(n<step){ setStepDir(-1);setStep(n);setErrors({});window.scrollTo(0,0); }
        // Permite avançar apenas para o próximo step (não pular etapas)
        else if(n===step+1){ if(validateStep()){ setStepDir(1);setStep(n);setErrors({});window.scrollTo(0,0); } }
      };

      const validateStep = ()=>{
        const e={};
        if(step===1){
          if(!formData.businessName)         e.businessName="Nome obrigatório";
          if(!validateCNPJ(formData.cnpj))   e.cnpj="CNPJ inválido";
          if(!formData.cnpjVerified)         e.cnpjVerified="Verifique o CNPJ";
          if(!validateEmail(formData.email)) e.email="E-mail inválido";
          if(!formData.phone)                e.phone="Telefone obrigatório";
        }
        if(step===2){
          if(!formData.cep)    e.cep="CEP obrigatório";
          if(!formData.street) e.street="Rua obrigatória";
          if(!formData.number) e.number="Número obrigatório";
          if(!formData.city)   e.city="Cidade obrigatória";
          if(!formData.state)  e.state="Estado obrigatório";
        }
        if(step===3){
          if(!formData.ownerName)  e.ownerName="Nome obrigatório";
          if(!formData.ownerEmail)              e.ownerEmail="E-mail obrigatório";
          else if(!validateEmail(formData.ownerEmail)) e.ownerEmail="E-mail inválido";
          if(formData.ownerCPF&&!validateCPF(formData.ownerCPF)) e.ownerCPF="CPF inválido";
        }
        if(step===4){
          if(!formData.emailVerified) e.emailVerified="Confirme o e-mail";
          if(!formData.phoneVerified) e.phoneVerified="Confirme o telefone";
        }
        if(step===5){
          const pw=formData.password;
          if(pw.length<8)                     e.password="Mínimo 8 caracteres";
          else if(!/[A-Z]/.test(pw))          e.password="Inclua ao menos uma maiúscula";
          else if(!/[0-9]/.test(pw))          e.password="Inclua ao menos um número";
          else if(!/[^A-Za-z0-9]/.test(pw))   e.password="Inclua ao menos um caractere especial (!@#$%...)";
          if(pw!==formData.confirmPassword)   e.confirmPassword="Senhas não conferem";
          if(!formData.acceptTerms)           e.acceptTerms="Aceite os termos";
          if(!formData.acceptPrivacy)         e.acceptPrivacy="Aceite a política";
          if(!formData.acceptAntiFraud)       e.acceptAntiFraud="Aceite os termos antifraude";
        }
        setErrors(e);
        return Object.keys(e).length===0;
      };

      const nextStep = ()=>{ if(validateStep()){setStepDir(1);setStep(p=>p+1);window.scrollTo(0,0);} };
      const prevStep = ()=>{ setStepDir(-1);setStep(p=>p-1);setErrors({});window.scrollTo(0,0); };

      // ── Submit ─────────────────────────────────────────────────────────────
      const handleSubmit = async()=>{
        if (!validateStep()) return;
        setIsSubmitting(true);
        if (!protocolRef.current) protocolRef.current=`BH-${uid().slice(0,8).toUpperCase()}`;
        try {
          let userId = authUser?.uid;
          if (!userId) {
            const cred = await auth.createUserWithEmailAndPassword(formData.email,formData.password);
            userId = cred.user.uid;
          }
          await submitToFirestore(userId,formData,services,products,protocolRef.current,salonPhotos.map(p=>p.url||p.preview));
          setScreen("review");
        } catch(err) {
          if (err.message==="cnpj_duplicate") showToast("Este CNPJ já está cadastrado na plataforma.","error");
          else if (err.message?.startsWith("service_price:")) showToast(err.message.replace("service_price:",""),"error");
          else if (err.code==="auth/email-already-in-use") showToast("E-mail já cadastrado. Tente fazer login.","error");
          else if (err.code==="auth/weak-password")   showToast("Senha muito fraca (Firebase: mínimo 6 chars)","error");
          else { showToast("Erro ao salvar. Tente novamente.","error"); console.error(err); }
        } finally { setIsSubmitting(false); }
      };

      const handleImageUpload = (e,setter)=>{
        const f=e.target.files[0];if(!f)return;
        if(!ALLOWED_IMAGE_TYPES.includes(f.type)){showToast("Formato inválido","error");e.target.value="";return;}
        if(f.size>5*1024*1024){showToast("Máx 5MB","error");e.target.value="";return;}
        const r=new FileReader();r.onload=ev=>setter(ev.target.result);r.readAsDataURL(f);
      };

      const restoreDraft = async()=>{
        if(!authUser)return;
        setDraftLoading(true);
        try {
          const draft=await loadDraftFS(authUser.uid);
          if(draft){
            // Fix #12: filtra apenas chaves conhecidas do INITIAL_FORM para evitar injeção de dados desconhecidos
            const KNOWN_KEYS = new Set([...Object.keys(INITIAL_FORM), "_services", "_products", "_salonPhotos"]);
            const safeDraft = Object.fromEntries(Object.entries(draft).filter(([k])=>KNOWN_KEYS.has(k)));
            if(Array.isArray(safeDraft._services)) { setServices(safeDraft._services); delete safeDraft._services; }
            if(Array.isArray(safeDraft._products)) { setProducts(safeDraft._products); delete safeDraft._products; }
            if(Array.isArray(safeDraft._salonPhotos)) { setSalonPhotos(safeDraft._salonPhotos.map(p=>typeof p==="string"?{id:uid(),preview:p,url:p}:p)); delete safeDraft._salonPhotos; }
            dispatch({key:"__reset",val:safeDraft});
            setHasDraft(false);
            setScreen("form");
            showToast("Rascunho restaurado ✓","success");
          }
        } catch { showToast("Erro ao carregar rascunho","error"); }
        finally { setDraftLoading(false); }
      };

      // Bug fix: limpa sugestões de CNAE quando accountType não é salão
      useEffect(()=>{
        if (accountType==="fornecedor") setCnpjSugg([]);
      },[accountType]);
      const needsServices = accountType==="salao"||accountType==="ambos";
      const needsProducts = accountType==="fornecedor"||accountType==="ambos";
      const totalSteps    = 5;
      const pwStrength    = passwordStrength(formData.password);

      // Admin panel — guarda por autenticação e lista de UIDs admin
      if (showAdmin) {
        if (!authUser || !ADMIN_UIDS.includes(authUser.uid)) {
          return (
            <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F8F6F2",gap:16}}>
              <div style={{fontSize:"3rem"}}>🔒</div>
              <div style={{fontFamily:"'Lora',Georgia,serif",fontSize:"1.4rem"}}>Acesso restrito</div>
              <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".82rem",color:"#9A9288"}}>Faça login para acessar o painel admin.</div>
              <button onClick={()=>setShowAdmin(false)} className="btn" style={{padding:"10px 24px",borderRadius:8,background:"#1A1715",color:"#fff",fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".78rem"}}>← Voltar</button>
            </div>
          );
        }
        return <AdminPanel onBack={()=>setShowAdmin(false)} currentUser={authUser} />;
      }

      // authLoading: a tela #app-loading cobre o React enquanto Firebase inicializa
      // Se Firebase demorar, o timeout de 3s já remove o loader e o app renderiza normalmente

      return (
        <div style={{minHeight:"100vh",background:"#F8F5F0"}}>
          {/* TOAST */}
          {toast&&(
            <div style={{position:"fixed",top:16,right:16,zIndex:9999,animation:"toastIn .28s ease",
              background:toast.type==="error"?"#2A1210":toast.type==="success"?"#0F2010":toast.type==="info"?"#14203A":"#1A1715",
              color:toast.type==="error"?"#F4907A":toast.type==="success"?"#7DC97D":toast.type==="info"?"#79B8D4":"#F7F5F0",
              padding:"12px 20px",borderRadius:10,fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".82rem",
              boxShadow:"0 8px 32px rgba(0,0,0,.35)",
              borderLeft:`3px solid ${toast.type==="error"?"#D4735A":toast.type==="success"?"#5BAA5B":toast.type==="info"?"#79B8D4":"#C9A96E"}`,
              maxWidth:380,lineHeight:1.5}}>
              {toast.msg}
            </div>

                    </Field>
                    <Field label="Telefone *" error={errors.phone}>
                      <input className={`inp${errors.phone?" err":""}`} value={formData.phone} onChange={e=>set("phone",fmtPhone(e.target.value))} autoComplete="tel" placeholder="(11) 99999-0000" inputMode="tel" />
                    </Field>
                  </Row2>
                  <Row2>
                    <Field label="WhatsApp"><input className="inp" value={formData.whatsapp} onChange={e=>set("whatsapp",fmtPhone(e.target.value))} autoComplete="tel" placeholder="(11) 99999-0000" inputMode="tel" /></Field>
                    <Field label="Instagram">
                      <div style={{position:"relative"}}>
                        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".85rem",color:"#5A5044"}}>@</span>
                        <input className="inp" style={{paddingLeft:28}} value={formData.instagram} onChange={e=>set("instagram",e.target.value)} placeholder="seunegocio" />
                      </div>
                    </Field>
                  </Row2>
                  <Field label="Descrição do Negócio">
                    <textarea className="inp" rows={3} value={formData.description} onChange={e=>set("description",e.target.value)} placeholder="Descreva seus serviços, especialidades e diferenciais..." />
                  </Field>
                  <Row2>
                    <Field label="Logo"><ImageUpload preview={logoPreview} onChange={e=>handleImageUpload(e,setLogoPreview)} label="PNG/JPG · máx 5MB" /></Field>
                    <Field label="Foto de Capa"><ImageUpload preview={coverPreview} onChange={e=>handleImageUpload(e,setCoverPreview)} label="Foto principal · 16:9" /></Field>
                  </Row2>
                  {(accountType==="salao"||accountType==="ambos")&&(
                    <Field label="Galeria de Fotos do Salão">
                      <GalleryUpload photos={salonPhotos} setPhotos={setSalonPhotos} userId={authUser?.uid} showToast={showToast} />
                    </Field>
                  )}
                </FormSection>
              )}

              {/* ── STEP 2 ── */}
              {step===2&&(
                <FormSection title="02 — Endereço" icon="📍">
                  <Hint>O CEP preenche o endereço automaticamente via ViaCEP.</Hint>
                  <Row2>
                    <Field label="CEP *" error={errors.cep}><input className={`inp${errors.cep?" err":""}`} value={formData.cep} onChange={e=>set("cep",fmtCEP(e.target.value))} autoComplete="postal-code" placeholder="00000-000" inputMode="numeric" /></Field>
                    <Field label="Estado *" error={errors.state}>
                      <select className={`inp${errors.state?" err":""}`} value={formData.state} onChange={e=>set("state",e.target.value)}>
                        <option value="">Selecione</option>{STATES_BR.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </Field>
                  </Row2>
                  <Field label="Logradouro *" error={errors.street}><input className={`inp${errors.street?" err":""}`} value={formData.street} onChange={e=>set("street",e.target.value)} placeholder="Rua, Avenida..." /></Field>
                  <Row2>
                    <Field label="Número *" error={errors.number}><input className={`inp${errors.number?" err":""}`} value={formData.number} onChange={e=>set("number",e.target.value)} placeholder="123" inputMode="numeric" /></Field>
                    <Field label="Complemento"><input className="inp" value={formData.complement} onChange={e=>set("complement",e.target.value)} placeholder="Sala, Loja..." /></Field>
                  </Row2>
                  <Row2>
                    <Field label="Bairro"><input className="inp" value={formData.neighborhood} onChange={e=>set("neighborhood",e.target.value)} placeholder="Bairro" /></Field>
                    <Field label="Cidade *" error={errors.city}><input className={`inp${errors.city?" err":""}`} value={formData.city} onChange={e=>set("city",e.target.value)} placeholder="Cidade" /></Field>
                  </Row2>
                  {/* Upload real para Storage (melhoria 1.2) */}
                  <Field label="Comprovante de Endereço">
                    <DocUpload fieldName="addressProof" userId={authUser?.uid} uploadedUrl={formData.addressProofUrl}

                  </Field>
                </FormSection>
              )}

              {/* ── STEP 3 ── */}
              {step===3&&(
                <FormSection title="03 — Responsável Legal" icon="👤">

                  <Row2>
                    <Field label="Nome Completo *" error={errors.ownerName}><input className={`inp${errors.ownerName?" err":""}`} value={formData.ownerName} onChange={e=>set("ownerName",e.target.value)} autoComplete="name" placeholder="Nome conforme RG/CNH" /></Field>
                    <Field label="CPF" error={errors.ownerCPF}><input className={`inp${errors.ownerCPF?" err":""}`} value={formData.ownerCPF} onChange={e=>set("ownerCPF",fmtCPF(e.target.value))} placeholder="000.000.000-00" inputMode="numeric" /></Field>

                    <DocUpload fieldName="ownerDoc" userId={authUser?.uid} uploadedUrl={formData.ownerDocUrl}

                  <Field label="Cartão CNPJ">
                    <DocUpload fieldName="cnpjDoc" userId={authUser?.uid} uploadedUrl={formData.cnpjDocUrl}
                      onUploaded={url=>set("cnpjDocUrl",url)}
                      onError={msg=>showToast(msg,"error")}
                      label="Cartão CNPJ da Receita Federal · PDF/JPG" />
                  </Field>
                </FormSection>
              )}

              {/* ── STEP 4 ── */}
              {step===4&&(
                <FormSection title="04 — Verificação de Contato" icon="📱">
                  <Hint>Código de 6 dígitos. Configure EmailJS ou Cloud Functions para envio real.</Hint>
                  {/* Email */}
                  <div style={{background:"#fff",border:"1px solid #DDD5CA",borderRadius:12,padding:"20px",marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".8rem",fontWeight:500}}>📧 E-mail</div>
                        <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#5A5044",marginTop:2}}>{formData.email||"—"}</div>
                      </div>
                      {formData.emailVerified
                        ?<span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#1E6B22",background:"#5BAA5B15",padding:"4px 12px",borderRadius:20,border:"1px solid #5BAA5B40"}}>✓ Verificado</span>
                        :<button className="btn" onClick={()=>sendVerification("email")} disabled={sendingCode||!formData.email} style={{padding:"6px 14px",borderRadius:6,background:"#0E0C09",color:"#F7F5F0",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",display:"flex",alignItems:"center"}}>
                          {sendingCode&&<span className="spinner" />}Enviar código
                        </button>}
                    </div>
                    {!formData.emailVerified&&(
                      <div style={{display:"flex",gap:8}}>
                        <input className="inp" value={formData.emailCode} onChange={e=>set("emailCode",e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="000000" style={{flex:1,letterSpacing:"4px",fontSize:"1.1rem",textAlign:"center"}} maxLength={6} inputMode="numeric" />
                        <button className="btn" onClick={()=>checkCode("email")} style={{padding:"0 16px",borderRadius:8,background:"#9A6D1F",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem"}}>Confirmar</button>
                      </div>
                    )}
                    {errors.emailVerified&&<div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#A83220",marginTop:6}}>{errors.emailVerified}</div>}
                  </div>
                  {/* Phone */}
                  <div style={{background:"#fff",border:"1px solid #DDD5CA",borderRadius:12,padding:"20px",marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".8rem",fontWeight:500}}>📱 Telefone</div>
                        <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#5A5044",marginTop:2}}>{formData.phone||"—"}</div>
                      </div>
                      {formData.phoneVerified
                        ?<span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#1E6B22",background:"#5BAA5B15",padding:"4px 12px",borderRadius:20,border:"1px solid #5BAA5B40"}}>✓ Verificado</span>
                        :<button className="btn" onClick={()=>sendVerification("phone")} disabled={sendingCode||!formData.phone} style={{padding:"6px 14px",borderRadius:6,background:"#0E0C09",color:"#F7F5F0",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",display:"flex",alignItems:"center"}}>
                          {sendingCode&&<span className="spinner" />}Enviar código
                        </button>}
                    </div>
                    {!formData.phoneVerified&&(
                      <div style={{display:"flex",gap:8}}>
                        <input className="inp" value={formData.phoneCode} onChange={e=>set("phoneCode",e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="000000" style={{flex:1,letterSpacing:"4px",fontSize:"1.1rem",textAlign:"center"}} maxLength={6} inputMode="numeric" />
                        <button className="btn" onClick={()=>checkCode("phone")} style={{padding:"0 16px",borderRadius:8,background:"#9A6D1F",color:"#fff",fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem"}}>Confirmar</button>
                      </div>

                    {errors.phoneVerified&&<div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#A83220",marginTop:6}}>{errors.phoneVerified}</div>}

                  {/* Checklist */}
                  <div style={{background:"#F8F5F0",border:"1px solid #DDD5CA",borderRadius:12,padding:"16px 20px"}}>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",letterSpacing:"2px",color:"#5A5044",marginBottom:12}}>CHECKLIST DE SEGURANÇA</div>
