                      const done=(r.id==="cnpj"&&formData.cnpjVerified)||(r.id==="tel"&&formData.phoneVerified)||(r.id==="email"&&formData.emailVerified)||(r.id==="doc"&&(formData.ownerDoc||formData.ownerDocUrl))||(r.id==="addr"&&(formData.addressProof||formData.addressProofUrl));
                      return(
                        <div key={r.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,transition:"all .3s"}}>
                          <div style={{width:20,height:20,borderRadius:"50%",background:done?"#5BAA5B15":"#EDE9E2",border:`1px solid ${done?"#5BAA5B":"#DDD8CE"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .3s"}}>
                            {done?<span style={{color:"#1E6B22",fontSize:".7rem"}}>✓</span>:<span style={{color:"#C8BBA8",fontSize:".7rem"}}>○</span>}
                          </div>
                          <div>
                            <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".75rem",color:done?"#0E0C09":"#5A5044",fontWeight:done?500:400,transition:"all .3s"}}>{r.label}</div>
                            <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:"#5A5044"}}>{r.desc}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </FormSection>
              )}

              {/* ── STEP 5 ── */}
              {step===5&&(
                <FormSection title="05 — Acesso e Termos" icon="🔐">
                  <Row2>
                    <Field label="Senha *" error={errors.password}>
                      <div className="pass-wrap">
                        <input className={`inp${errors.password?" err":""}`} type={showPass?"text":"password"} autoComplete="new-password" value={formData.password} onChange={e=>set("password",e.target.value)} placeholder="Mín. 8 · maiúscula · número" style={{paddingRight:36}} />
                        <span className="pass-eye" onClick={()=>setShowPass(p=>!p)}>{showPass?"🙈":"👁️"}</span>
                      </div>
                      {formData.password&&(
                        <div style={{marginTop:6}}>
                          <div style={{height:3,background:"#DDD8CE",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:`${pwStrength.score}%`,background:pwStrength.color,transition:"all .4s ease"}} /></div>
                          <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:pwStrength.color,marginTop:3}}>{pwStrength.label}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                            {[{ok:formData.password.length>=8,label:"8+ chars"},{ok:/[A-Z]/.test(formData.password),label:"Maiúscula"},{ok:/[0-9]/.test(formData.password),label:"Número"},{ok:/[^A-Za-z0-9]/.test(formData.password),label:"Símbolo"}].map(r=>(
                              <span key={r.label} style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".6rem",padding:"2px 7px",borderRadius:10,background:r.ok?"#5BAA5B15":"#F0EDE8",color:r.ok?"#5BAA5B":"#9A9288",border:`1px solid ${r.ok?"#5BAA5B40":"#DDD8CE"}`,transition:"all .25s"}}>
                                {r.ok?"✓ ":""}{r.label}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </Field>
                    <Field label="Confirmar Senha *" error={errors.confirmPassword}>
                      <div className="pass-wrap">
                        <input className={`inp${errors.confirmPassword?" err":""}`} type={showCPass?"text":"password"} autoComplete="new-password" value={formData.confirmPassword} onChange={e=>set("confirmPassword",e.target.value)} placeholder="Repita a senha" style={{paddingRight:36}} />
                        <span className="pass-eye" onClick={()=>setShowCPass(p=>!p)}>{showCPass?"🙈":"👁️"}</span>
                      </div>
                      {formData.confirmPassword&&formData.password===formData.confirmPassword&&<div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",color:"#1E6B22",marginTop:4}}>✓ Senhas coincidem</div>}
                    </Field>
                  </Row2>
                  <div style={{background:"#F8F5F0",border:"1px solid #DDD5CA",borderRadius:12,padding:"16px 20px",marginBottom:20}}>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",letterSpacing:"2px",color:"#5A5044",marginBottom:14}}>DADOS BANCÁRIOS</div>

                      <Field label="Banco"><input className="inp" value={formData.bankName} onChange={e=>set("bankName",e.target.value)} placeholder="Nome do banco" /></Field>

                    </Row2>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
                    {[
                      {key:"acceptTerms",     label:"Li e aceito os Termos de Uso",                                                     err:errors.acceptTerms},
                      {key:"acceptPrivacy",   label:"Li e aceito a Política de Privacidade (LGPD)",                                     err:errors.acceptPrivacy},
                      {key:"acceptAntiFraud", label:"Declaro que as informações são verídicas e estou ciente das penalidades por fraude",err:errors.acceptAntiFraud,warn:true},
                    ].map(t=>(
                      <div key={t.key} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                        <div className={`check-box${formData[t.key]?" on":""}`} onClick={()=>set(t.key,!formData[t.key])}>
                          {formData[t.key]&&<span style={{color:"#fff",fontSize:".7rem"}}>✓</span>}
                        </div>
                        <div>
                          <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".78rem",color:t.warn?"#7A5020":"#0E0C09",lineHeight:1.5}}>{t.label}</span>
                          {t.err&&<div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".68rem",color:"#A83220",marginTop:2}}>{t.err}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:"#F0F7FF",border:"1px solid #C0D8F0",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}}>
                    <span>☁️</span>
                    <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#2A5080",lineHeight:1.6}}>
                      Ao enviar, sua conta será criada no <strong>Firebase Authentication</strong> e seus dados e documentos salvos com segurança no <strong>Firestore + Storage</strong>.
                    </div>
                  </div>
                </FormSection>
              )}

              </div>{/* end step animation wrapper */}

              {/* Catálogo opcional */}
              {step===5&&(needsServices||needsProducts)&&(
                <div style={{marginTop:40}} className="fade-up">
                  <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",letterSpacing:"4px",color:"#5A5044",marginBottom:8,textAlign:"center"}}>PRÉ-CADASTRO DE CATÁLOGO (OPCIONAL)</div>
                  {/* Fix #9: aviso quando não há serviços */}
                  {needsServices&&services.length===0&&(
                    <div style={{background:"#FBF6EE",border:"1px solid #DFC070",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:"1.1rem"}}>⚠️</span>
                      <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".82rem",color:"#6A500A"}}>
                        Você ainda não cadastrou serviços. Adicione pelo menos um para que clientes encontrem o que você oferece.
                      </div>
                    </div>
                  )}
                  {needsServices&&<ServiceEditor services={services} setServices={setServices} showToast={showToast} suggestedServices={cnpjSuggestions} />}
                  {needsProducts&&<ProductEditor products={products} setProducts={setProducts} showToast={showToast} />}
                </div>
              )}

              {/* Navigation buttons */}
              <div style={{display:"flex",gap:12,marginTop:28,paddingTop:24,borderTop:"1px solid #DDD5CA"}}>
                {step>1
                  ?<button className="btn btn-ghost" onClick={prevStep} aria-label="Etapa anterior" style={{flex:1,padding:"14px",borderRadius:10,fontSize:".85rem",letterSpacing:"1px"}}>← Anterior</button>
                  :<div style={{flex:1}} />
                }
                {step<totalSteps
                  ?<button className="btn btn-primary" onClick={nextStep} aria-label="Próxima etapa" style={{flex:2,padding:"14px",borderRadius:10,fontSize:".85rem",letterSpacing:"2px"}}>Próximo →</button>
                  :<button className="btn btn-gold" onClick={handleSubmit} disabled={isSubmitting} aria-label="Enviar cadastro" style={{flex:2,padding:"14px",borderRadius:10,fontSize:".85rem",letterSpacing:"2px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {isSubmitting&&<span className="spinner" />}
                    {isSubmitting?"Salvando...":"ENVIAR CADASTRO ✓"}
                  </button>}
              </div>
            </div>
          )}

          {/* ══ REVIEW ════════════════════════════════════════════════════════ */}
          {screen==="review"&&(
            <div className="fade-up" style={{maxWidth:560,margin:"0 auto",padding:"72px 24px",textAlign:"center"}}>
              <div style={{width:80,height:80,borderRadius:"50%",background:"#1E6B2212",border:"2px solid #1E6B2235",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2.4rem",margin:"0 auto 28px",animation:"popIn .4s ease"}}>🎉</div>
              <div className="badge badge-gold" style={{marginBottom:16}}>CADASTRO RECEBIDO</div>
              <h2 style={{fontFamily:"'Lora', Georgia, serif",fontSize:"2.25rem",fontWeight:300,margin:"12px 0 14px",color:"#0E0C09"}}>Falta pouco!</h2>
              <p style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".9rem",color:"#3A342A",lineHeight:1.8,marginBottom:36}}>
                Seus dados foram salvos com segurança. Nossa equipe revisará em até <strong style={{color:"#0E0C09"}}>48 horas úteis</strong>.
              </p>
              <div style={{background:"#fff",border:"1px solid #DDD5CA",borderRadius:14,padding:"24px",marginBottom:24,textAlign:"left"}}>
                <div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".65rem",letterSpacing:"2px",color:"#5A5044",marginBottom:16}}>RESUMO DO CADASTRO</div>
                {[
                  {label:"Estabelecimento", val: formData.businessName||"—"},
                  {label:"CNPJ",            val: formData.cnpj||"—"},
                  {label:"Tipo de conta",   val: accountType==="salao"?"Salão / Clínica":accountType==="profissional"?"Profissional Autônomo":"Salão + Profissional"},
                  {label:"Endereço",        val: formData.city&&formData.state?`${formData.city} — ${formData.state}`:"—"},
                  {label:"Responsável",     val: formData.ownerName||"—"},
                ].map(r=>(
                  <div key={r.label} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:12,marginBottom:10,paddingBottom:10,borderBottom:"1px solid #DDD5CA"}}>
                    <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".72rem",color:"#5A5044",flexShrink:0}}>{r.label}</span>
                    <span style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".82rem",color:"#0E0C09",fontWeight:500,textAlign:"right"}}>{r.val}</span>
                  </div>
                ))}
                {services.length>0&&(
                  <div>

  <!-- Service Worker para PWA offline + instalação -->
  <script>
    if ('serviceWorker' in navigator) {
      const CACHE_NAME = 'beleza-ja-v2';
      const swCode = `
        const CACHE = '${CACHE_NAME}';
        const CDN = [
          'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js',
          'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.min.js',
          'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.min.js',
          'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-storage-compat.min.js',
          'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js',
          'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js',
          'https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js',
        ];
        self.addEventListener('install', e => {
          e.waitUntil(
            caches.open(CACHE)
              .then(c => c.addAll(CDN).catch(() => {}))
              .then(() => self.skipWaiting())
          );
        });
        self.addEventListener('activate', e => {
          e.waitUntil(
            caches.keys().then(keys => Promise.all(
              keys.filter(k => k !== CACHE).map(k => caches.delete(k))
            )).then(() => clients.claim())
          );
        });
        self.addEventListener('fetch', e => {
          if (e.request.method !== 'GET') return;
          // Cache-first para CDN, network-first para o restante
          const isCDN = e.request.url.includes('jsdelivr.net') || e.request.url.includes('gstatic.com') || e.request.url.includes('googleapis.com/css');
          if (isCDN) {
            e.respondWith(caches.match(e.request).then(cached => cached || fetch(e.request).then(r => {
              const clone = r.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
              return r;
            })));
          } else {
            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
          }
        });
      `;
      const swBlob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl  = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl)
        .then(reg => reg.update())
        .catch(() => {});
    }
  </script>


  <!-- Banner de instalação PWA (oculto até evento beforeinstallprompt) -->
