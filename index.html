  <!-- PWA: manifest gerado via Blob URL (evita limitações do data: URI) -->
  <script>
    (function() {
      var manifest = {
        name: "Beleza Já",
        short_name: "Beleza Já",
        description: "Encontre e agende seu salão ideal",
        start_url: "./",
        display: "standalone",
        background_color: "#F9F6F1",
        theme_color: "#1A1715",
        orientation: "portrait-primary",
        icons: [
          { src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="32" fill="#1A1715"/><text y="148" x="18" font-size="148" font-family="Georgia,serif" fill="#9A6D1F">B</text></svg>'), sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
          { src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="80" fill="#1A1715"/><text y="400" x="48" font-size="400" font-family="Georgia,serif" fill="#9A6D1F">B</text></svg>'), sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
        ]
      };
      try {
        var blob = new Blob([JSON.stringify(manifest)], {type: "application/manifest+json"});
        var url  = URL.createObjectURL(blob);
        var link = document.createElement("link");
        link.rel = "manifest"; link.href = url;
        document.head.appendChild(link);
      } catch(e) { console.warn("PWA manifest não pôde ser gerado:", e); }
    })();
  </script>

  <!-- Lógica de instalação PWA -->
  <script>
    var _pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _pwaPrompt = e;
      // Mostra o banner após 3 segundos se ainda não instalou
      setTimeout(function() {
        var banner = document.getElementById('pwa-banner');
        if (banner && !localStorage.getItem('pwa-dismissed')) {
          banner.style.display = 'flex';
        }
      }, 3000);
    });
    window.triggerPwaInstall = function() {
      if (_pwaPrompt) {
        _pwaPrompt.prompt();
        _pwaPrompt.userChoice.then(function(r) {
          if (r.outcome === 'accepted') {
            document.getElementById('pwa-banner') && (document.getElementById('pwa-banner').style.display = 'none');
            localStorage.setItem('pwa-dismissed', '1');
          }
          _pwaPrompt = null;
        });
      } else {
        // iOS ou sem suporte — instrução manual
        alert('Para instalar no iPhone: toque em Compartilhar (⬜↑) → "Adicionar à Tela de Início"\n\nNo Android Chrome: toque no menu (⋮) → "Adicionar à tela inicial"');
      }
    };
    window.dismissPwaBanner = function() {
      var b = document.getElementById('pwa-banner');
      if (b) b.style.display = 'none';
      localStorage.setItem('pwa-dismissed', '1');
    };
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!--
    DEPENDÊNCIAS CDN — carregadas em ordem síncrona obrigatória:
    1. Firebase  (expõe window.firebase)
    2. React     (expõe window.React)
    3. ReactDOM  (expõe window.ReactDOM)
    4. Babel     (compila o <script type="text/babel"> abaixo)

    NÃO adicione SRI (integrity=) nestes scripts a menos que você tenha
    computado os hashes corretos com: openssl dgst -sha384 -binary arquivo | base64
    Hashes incorretos causam bloqueio silencioso do script — tela branca.
  -->

  <!-- Firebase compat SDK v10 (jsDelivr — mais estável que unpkg) -->
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-storage-compat.min.js"></script>

  <!-- React 18 + ReactDOM (jsDelivr) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone — compila JSX no browser sem build step -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <!--
    Suprime o aviso cosmético do Babel Standalone no console.
    O aviso ("You are using the in-browser Babel transformer") é apenas informativo —
    não afeta funcionalidade nem segurança. Para produção real use Vite.
    Para migrar: npm create vite@latest beleza-ja -- --template react
  -->
  <script>
    (function () {
      var _warn = console.warn.bind(console);
      console.warn = function () {
        var msg = arguments[0];
        if (typeof msg === 'string' && msg.indexOf('in-browser Babel transformer') !== -1) return;
        _warn.apply(console, arguments);
      };
    })();
  </script>

  <!-- Babel Standalone — compila JSX no browser sem build step -->
  <!-- Em produção use Vite/CRA para eliminar este overhead (~200KB) -->
  
  <!-- Guard: verifica se dependências carregaram antes de continuar -->
  <script>
    window.addEventListener('error', function(e) {
      // Captura erros de carregamento de scripts CDN
      if (e.target && e.target.src) {
        var el = document.getElementById('app-loading');
        if (!el) return; // body ainda não foi parseado — evita erro secundário
        el.innerHTML =
          '<div style="font-family:sans-serif;text-align:center;padding:40px;color:#D4735A">' +
          '<div style="font-size:2rem;margin-bottom:12px">⚠️</div>' +
          '<div style="font-size:1rem;font-weight:600;margin-bottom:8px">Falha ao carregar dependência</div>' +
          '<div style="font-size:.8rem;color:#9A9288;margin-bottom:16px">Verifique sua conexão com a internet e recarregue a página.</div>' +
          '<div style="font-size:.7rem;color:#B0A898;word-break:break-all">' + e.target.src + '</div>' +
          '<button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;border-radius:8px;background:#C9A96E;color:#fff;border:none;cursor:pointer;font-size:.85rem">Recarregar</button>' +
          '</div>';
      }
    }, true);
  </script>

  <style>

    /* ── Reset & Tokens ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Palette premium ─────────────────────────────────────────────────── */
      --ink:       #0A0806;   /* quase preto, mais quente */
      --ink2:      #1C1710;
      --ink3:      #2E2719;
      --gold:      #8B5E19;   /* mais profundo, mais luxo */
      --gold-lt:   #B8841F;
      --gold-mid:  #C9973A;
      --gold-pale: #D4A855;
      --gold-bg:   #FAF4E8;
      --gold-shine:linear-gradient(135deg,#8B5E19 0%,#C9973A 50%,#8B5E19 100%);
      --gold-ring: rgba(139,94,25,.22);
      --cream:     #F9F6F1;   /* levemente mais quente */
      --cream2:    #EDE8DF;
      --stone:     #D9D0C4;
      --stone2:    #BEB5A9;
      --muted:     #52473C;
      --muted2:    #36302A;
      --dark:      #111009;
      --dark2:     #1E1A12;
      --dark3:     #2A2418;
      --green:     #1A6020;
      --green-bg:  rgba(26,96,32,.09);
      --green-bd:  rgba(26,96,32,.28);
      --red:       #9B2D1C;
      --red-bg:    rgba(155,45,28,.08);
      --blue:      #1550A0;
      --warn:      #60420A;
      --warn-bg:   #FAF0D8;
      --warn-bd:   #C49820;

      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-2xl: 36px;

      --shadow-xs: 0 1px 3px rgba(0,0,0,.07);
      --shadow-sm: 0 2px 10px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
      --shadow-md: 0 8px 28px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.14), 0 6px 20px rgba(0,0,0,.08);
      --shadow-xl: 0 36px 96px rgba(0,0,0,.18), 0 10px 32px rgba(0,0,0,.10);
      --shadow-gold: 0 8px 32px rgba(139,94,25,.30);

      --font-serif: 'Lora', Georgia, serif;
      --font-sans:  'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono:  'JetBrains Mono', 'Courier New', monospace;

      --t-xs:   0.72rem;
      --t-sm:   0.85rem;
      --t-base: 1rem;
      --t-md:   1.1rem;
      --t-lg:   1.35rem;
      --t-xl:   1.7rem;
      --t-2xl:  2.2rem;
      --t-3xl:  3rem;

      /* Transições padrão */
      --ease: cubic-bezier(.22,1,.36,1);
      --ease-back: cubic-bezier(.34,1.56,.64,1);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #F8F5F0;
      color: #0E0C09;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.75;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    /* ── Animations ──────────────────────────────────────────────────────────── */
    @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideR   { from{opacity:0;transform:translateX(32px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideL   { from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes popIn    { 0%{transform:scale(.7);opacity:0} 55%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
    @keyframes toastIn  { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes shimmer  { 0%{background-position:-600px 0} 100%{background-position:600px 0} }

    .fade-up    { animation: fadeUp .44s cubic-bezier(.22,1,.36,1) both; }
    .slide-in   { animation: slideR .36s cubic-bezier(.22,1,.36,1) both; }
    .slide-back { animation: slideL .36s cubic-bezier(.22,1,.36,1) both; }
    .skeleton   {
      background: linear-gradient(90deg,#DDD5CA 25%,#EEE9E1 50%,#DDD5CA 75%);
      background-size:600px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: var(--radius-xs);
    }

    /* ── Input / Button primitives ──────────────────────────────────────────── */
    .inp {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #C4BAB0;
      border-radius: var(--radius-sm);
      background: #fff;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 1rem;
      color: #0E0C09;
      outline: none;
      line-height: 1.5;
      transition: border-color .18s, box-shadow .18s, transform .14s;
      font-weight: 400;
    }
    .inp::placeholder { color: #B8B0A6; font-size: .9rem; font-weight: 400; }
    .inp:focus {
      border-color: #9A6D1F;
      box-shadow: 0 0 0 3px rgba(154,109,31,.2);
      transform: translateY(-1px);
    }
    .inp.err  { border-color: #A83220;   box-shadow: 0 0 0 3px #A8322010; }
    .inp.ok   { border-color: #1E6B22; }
    select.inp   { cursor: pointer; }
    textarea.inp { resize: vertical; min-height: 96px; }

    /* Fix mobile auto-zoom */
    @media(max-width:640px) { .inp { font-size: 16px; min-height: 54px; } }

    /* Field label — LEGÍVEL */
    .field-label {
      display: block;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .75rem;
      font-weight: 700;
      color: #3A342A;
      letter-spacing: 0.3px;
      text-transform: none;
      margin-bottom: 8px;
    }

    /* Buttons */
    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .875rem;
      font-weight: 500;
      transition: all .2s cubic-bezier(.22,1,.36,1);
    }
    .btn:hover:not(:disabled)  { filter: brightness(1.06); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06); }
    .btn:active:not(:disabled) { transform: translateY(0); box-shadow: 0 1px 4px rgba(0,0,0,0.08); filter: brightness(.97); }
    .btn:disabled              { opacity: .45; cursor: not-allowed; }

    .btn-primary {
      background: #0E0C09;
      color: #F2EDE4;
      letter-spacing: 1px;
      font-weight: 600;
      font-size: .82rem;
    }
    .btn-gold {
      background: linear-gradient(135deg, #9A6D1F 0%, #BF8E3A 100%);
      color: #fff;
      letter-spacing: 1px;
      font-weight: 600;
      font-size: .82rem;
      box-shadow: 0 4px 16px rgba(154,109,31,.32);
    }
    .btn-ghost {
      background: #fff;
      color: #3A342A;
      border: 1.5px solid #C4BAB0;
      font-weight: 600;
      font-size: .875rem;
    }

    .hov { transition: all .24s cubic-bezier(.22,1,.36,1); cursor: pointer; }
    .hov:hover { transform: translateY(-4px); box-shadow: 0 16px 56px rgba(0,0,0,0.14),0 4px 16px rgba(0,0,0,0.08) !important; }

    /* ── Form helpers ───────────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed #C4BAB0;
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      transition: all .22s;
      background: #fff;
    }
    .drop-zone:hover { border-color: #9A6D1F; background: #FBF6EE; }

    .check-box {
      width: 22px; height: 22px;
      border: 2px solid #C4BAB0;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
      background: #fff;
    }
    .check-box:hover { border-color: #9A6D1F; transform: scale(1.08); }
    .check-box.on    { background: #9A6D1F; border-color: #9A6D1F; animation: popIn .22s ease; }

    .score-bar  { height: 7px; border-radius: 4px; background: #C4BAB0; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 4px; transition: width .7s cubic-bezier(.22,1,.36,1); }

    /* Step pills */
    .step-pill {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .75rem;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 20px;
      transition: all .22s;
      user-select: none;
      white-space: nowrap;
    }

    /* Password eye */
    .pass-wrap { position: relative; }
    .pass-eye  {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 1rem; color: #5A5044; user-select: none;
      transition: transform .15s, color .15s;
    }
    .pass-eye:hover { transform: translateY(-50%) scale(1.18); color: #9A6D1F; }

    /* Spinner */
    .spinner {
      width: 17px; height: 17px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .55s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    .sec-dot { animation: pulse 2.2s ease infinite; }

    /* Upload bar */
    .upload-bar  { height: 4px; background: #DDD5CA; border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .upload-fill { height: 100%; background: #9A6D1F; border-radius: 2px; transition: width .28s; }

    /* Badge */
    .badge {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .badge-gold  { background: #FBF6EE; color: #9A6D1F;  border: 1px solid #C49820; }
    .badge-green { background: #1E6B2212; color: #1E6B22; border: 1px solid #1E6B2235; }
    .badge-stone { background: #EEE9E1; color: #3A342A; border: 1px solid #DDD5CA; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #EEE9E1; }
    ::-webkit-scrollbar-thumb { background: #C4BAB0; border-radius: 3px; }

    :focus-visible { outline: 2px solid #9A6D1F; outline-offset: 3px; }

    /* ── Responsive grid ──────────────────────────────────────────────────── */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media(max-width:560px) { .row-2 { grid-template-columns: 1fr; } }

    /* Step pills — responsive */
    @media(max-width:540px) {
      .step-label-full  { display: none !important; }
      .step-label-short { display: inline !important; }
      .step-pill        { font-size: .65rem; padding: 5px 7px; }
    }

    /* Login modal */
    @media(max-width:420px) { .login-modal-inner { padding: 24px 18px !important; } }

    /* Touch targets */
    @media(max-width:640px) { button, [role="button"] { min-height: 48px; } }

    /* .navbar: ver bloco PREMIUM OVERHAUL abaixo */

    /* ── Section header ──────────────────────────────────────────────────────── */
    .section-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: #0E0C09;
    }

    /* ── Required marker ────────────────────────────────────────────────────── */
    .req { color: #9A6D1F; margin-left: 2px; }

    /* ── Info boxes ─────────────────────────────────────────────────────────── */
    .info-box      { background: #FBF6EE; border: 1px solid #D4A83040; border-radius: 10px; padding: 14px 18px; display: flex; gap: 12px; align-items: flex-start; }
    .info-box-blue { background: #EEF5FC; border-color: #BDD5EE; }
    .info-box-warn { background: #FAF0D8; border-color: #C49820; }

    /* ── Loading screen ─────────────────────────────────────────────────────── */
    #app-loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #F8F5F0; z-index: 9999; gap: 18px;
      transition: opacity .45s;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    #app-loading .logo  { font-family: 'Lora', Georgia, serif; font-size: 2.4rem; color: #0E0C09; letter-spacing: -1px; }
    #app-loading .logo em { color: #9A6D1F; font-style: italic; }
    #app-loading .hint  { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: .75rem; color: #5A5044; letter-spacing: 4px; font-weight: 600; }
    #app-loading .ring  {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2.5px solid #DDD5CA; border-top-color: #9A6D1F;
      animation: spin .7s linear infinite;
    }

    /* ── Service card — premium ─────────────────────────────────────────────── */
    .service-card {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid #DDD5CA;
      transition: all .22s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .service-card:hover { border-color: #C4BAB0; box-shadow: 0 2px 8px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05); transform: translateY(-1px); }

    /* ── Price chip ─────────────────────────────────────────────────────────── */
    .price-chip {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .875rem;
      font-weight: 700;
      color: #9A6D1F;
      background: #FBF6EE;
      border: 1px solid #D4A83030;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }

    /* ═══════════════════════════════════════════════════════════════
       AGENDA — estilos
    ═══════════════════════════════════════════════════════════════ */
    /* Overlay principal */
    #agenda-overlay, #reserva-overlay {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(14,12,9,.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: stretch;
      opacity: 0; pointer-events: none;
      transition: opacity .28s;
    }
    #agenda-overlay.open, #reserva-overlay.open {
      opacity: 1; pointer-events: all;
    }

    /* Painel da agenda */
    .ag-panel {
      display: flex; width: 100%; max-width: 1100px;
      margin: auto; background: #F8F5F0;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.28);
      max-height: 92vh;
    }
    @media(max-width:768px) { .ag-panel { flex-direction: column; border-radius: 16px 16px 0 0; margin-top: auto; max-height: 95vh; } }

    /* Coluna esquerda: calendário mini */
    .ag-sidebar {
      width: 280px; flex-shrink: 0;
      background: #1A1715; color: #F8F5F0;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    @media(max-width:768px) { .ag-sidebar { width: 100%; max-height: 280px; } }

    .ag-sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .ag-sidebar-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.1rem; font-weight: 500;
      color: #F8F5F0; margin-bottom: 2px;
    }
    .ag-sidebar-sub {
      font-size: .7rem; color: rgba(255,255,255,.4);
      letter-spacing: .5px;
    }

    /* Calendário mini */
    .ag-cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 8px;
    }
    .ag-cal-mesano {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .8rem; font-weight: 600; color: #BF8E3A;
      letter-spacing: .3px;
    }
    .ag-cal-navbtn {
      background: none; border: none; color: rgba(255,255,255,.5);
      font-size: 1.1rem; cursor: pointer; padding: 4px 8px;
      border-radius: 6px; transition: all .15s;
    }
    .ag-cal-navbtn:hover { background: rgba(255,255,255,.08); color: #fff; }

    .ag-cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 2px; padding: 4px 14px 16px;
    }
    .ag-cal-dow {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .6rem; font-weight: 600;
      color: rgba(255,255,255,.3); text-align: center;
      padding: 4px 0; letter-spacing: .5px;
    }
    .ag-cal-dia {
      display: flex; flex-direction: column; align-items: center;
      padding: 5px 2px 3px; border-radius: 8px;
      cursor: pointer; transition: all .15s; position: relative;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .78rem; color: rgba(255,255,255,.6);
    }
    .ag-cal-dia:hover { background: rgba(255,255,255,.08); color: #fff; }
    .ag-cal-dia.hoje > span:first-child {
      background: #9A6D1F; color: #fff;
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .ag-cal-dia.sel {
      background: rgba(191,142,58,.18); color: #BF8E3A;
    }
    .ag-cal-dia.sel > span:first-child { font-weight: 700; }
    .ag-cal-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(191,142,58,.6); margin-top: 3px;
      font-size: 0; /* esconde o número, só mostra o ponto */
    }
    .ag-cal-dot.pendente { background: #E8935A; }
    .ag-cal-dia.tem-ag { color: rgba(255,255,255,.85); }

    /* Serviços no sidebar */
    .ag-svc-btn {
      margin: 12px 16px 0;
      padding: 10px; border-radius: 10px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .72rem; font-weight: 500;
      cursor: pointer; transition: all .18s; text-align: center;
      letter-spacing: .3px;
    }
    .ag-svc-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

    /* Coluna direita: detalhe do dia */
    .ag-main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: #fff;
    }
    .ag-main-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #EEE9E1;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-shrink: 0;
    }
    .ag-close-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: #F8F5F0; border: 1px solid #DDD5CA;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .85rem; transition: all .15s; color: #5A5044;
    }
    .ag-close-btn:hover { background: #0E0C09; color: #fff; border-color: #0E0C09; }

    #agenda-dia-cont { flex: 1; overflow-y: auto; padding: 0 24px 24px; }

    /* Header do dia */
    .ag-dia-header {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 0 16px;
    }
    .ag-dia-titulo {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.1rem; font-weight: 500; color: #0E0C09;
    }
    .ag-dia-sub {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .7rem; color: #9A9288; margin-top: 1px;
    }
    .ag-dia-navbtn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid #DDD5CA; background: #fff;
      cursor: pointer; color: #5A5044; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .ag-dia-navbtn:hover { border-color: #9A6D1F; color: #9A6D1F; }

    .ag-btn-novo {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 10px;
      background: #0E0C09; color: #F8F5F0;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .78rem; font-weight: 600;
      border: none; cursor: pointer; margin-bottom: 16px;
      transition: all .18s; letter-spacing: .3px;
    }
    .ag-btn-novo:hover { background: #9A6D1F; transform: translateY(-1px); }

    /* Timeline do dia */
    .ag-timeline { display: flex; flex-direction: column; gap: 2px; }
    .ag-slot {
      display: flex; gap: 12px; align-items: flex-start;
      min-height: 40px;
    }
    .ag-slot-hora {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .68rem; font-weight: 500;
      color: #C4BAB0; padding-top: 10px; width: 40px;
      flex-shrink: 0; text-align: right;
    }
    .ag-slot.ocupado .ag-slot-hora { color: #5A5044; }
    .ag-slot-content { flex: 1; padding: 4px 0; }
    .ag-slot-vazio {
      height: 36px; border-radius: 8px;
      border: 1px dashed #EEE9E1;
      cursor: pointer; transition: all .15s;
    }
    .ag-slot-vazio:hover { background: #FBF6EE; border-color: #BF8E3A; }

    /* Card de agendamento */
    .ag-card {
      background: #F8F5F0; border-radius: 10px;
      border: 1px solid #DDD5CA;
      border-left: 4px solid #9A6D1F;
      padding: 10px 14px; cursor: pointer;
      transition: all .18s; margin-bottom: 4px;
    }
    .ag-card:hover { transform: translateX(3px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .ag-card-top {
      display: flex; justify-content: space-between;
      align-items: center; gap: 8px; margin-bottom: 5px;
    }
    .ag-card-nome {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .85rem; font-weight: 600; color: #0E0C09;
    }
    .ag-card-status {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .65rem; font-weight: 600; letter-spacing: .3px;
    }
    .ag-card-info {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .72rem; color: #5A5044; flex-wrap: wrap;
    }
    .ag-card-tel {
      text-decoration: none; font-size: .85rem;
      transition: transform .15s;
    }
    .ag-card-tel:hover { transform: scale(1.2); }
    .ag-card-obs {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .68rem; color: #9A9288; margin-top: 5px;
      font-style: italic;
    }

    /* Modal de formulário */
    .ag-form-modal, .ag-detalhe-modal, .ag-servicos-modal {
      position: fixed; inset: 0; z-index: 9100;
      background: rgba(14,12,9,.6);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; opacity: 0; pointer-events: none;
      transition: opacity .22s;
    }
    .ag-form-modal.open, .ag-detalhe-modal.open, .ag-servicos-modal.open {
      opacity: 1; pointer-events: all;
    }
    .ag-form-inner, .ag-det-inner, .ag-svc-inner {
      background: #fff; border-radius: 16px;
      padding: 28px; width: 100%; max-width: 460px;
      box-shadow: 0 24px 64px rgba(0,0,0,.28);
      animation: fadeUp .22s ease;
      max-height: 90vh; overflow-y: auto;
    }
    .ag-form-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; padding-bottom: 16px;
      border-bottom: 1px solid #EEE9E1;
    }
    .ag-form-titulo {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.1rem; font-weight: 500; color: #0E0C09;
    }
    .ag-form-grid {
      display: flex; flex-direction: column; gap: 14px;
      margin-bottom: 20px;
    }
    .ag-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:480px) { .ag-form-row { grid-template-columns: 1fr; } }

    .ag-form-salvar {
      width: 100%; padding: 13px; border-radius: 10px;
      background: #0E0C09; color: #F8F5F0;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .82rem; font-weight: 600;
      border: none; cursor: pointer; transition: all .18s;
      letter-spacing: .5px;
    }
    .ag-form-salvar:hover:not(:disabled) { background: #9A6D1F; }
    .ag-form-salvar:disabled { opacity: .5; cursor: not-allowed; }

    /* Detalhe do agendamento */
    .ag-det-header {
      border-left: 4px solid; padding: 12px 16px;
      background: #F8F5F0; border-radius: 0 8px 8px 0;
      margin-bottom: 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ag-det-data {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .82rem; font-weight: 600; color: #0E0C09;
    }
    .ag-det-status {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .68rem; font-weight: 600;
      padding: 4px 10px; border-radius: 20px; letter-spacing: .3px;
    }
    .ag-det-campo {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #F0EDE8;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .82rem;
    }
    .ag-det-campo span:first-child { color: #9A9288; }
    .ag-det-campo b { color: #0E0C09; font-weight: 600; }
    .ag-det-link {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .75rem; font-weight: 600;
      padding: 5px 12px; border-radius: 6px;
      background: #F8F5F0; border: 1px solid #DDD5CA;
      color: #3A342A; text-decoration: none; transition: all .15s;
    }
    .ag-det-link:hover { background: #0E0C09; color: #fff; border-color: #0E0C09; }
    .ag-det-link.wpp:hover { background: #25D366; border-color: #25D366; }
    .ag-det-acoes {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-top: 20px;
    }
    .ag-det-btn {
      padding: 10px; border-radius: 9px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .75rem; font-weight: 600;
      cursor: pointer; border: none; transition: all .18s;
    }
    .ag-det-btn.confirm  { background: #1E6B2215; color: #1E6B22; border: 1px solid #1E6B2235; }
    .ag-det-btn.concluir { background: #1d4ed815; color: #1d4ed8; border: 1px solid #1d4ed835; }
    .ag-det-btn.editar   { background: #FBF6EE; color: #9A6D1F; border: 1px solid #D4A83030; }
    .ag-det-btn.cancel   { background: #A8322010; color: #A83220; border: 1px solid #A8322025; }
    .ag-det-btn:hover { filter: brightness(.92); transform: translateY(-1px); }

    /* Gerenciar serviços */
    .ag-svc-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-radius: 10px;
      background: #F8F5F0; margin-bottom: 6px;
      border: 1px solid #EEE9E1;
    }
    .ag-svc-info { display: flex; flex-direction: column; gap: 2px; }
    .ag-svc-info b {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .85rem; font-weight: 600; color: #0E0C09;
    }
    .ag-svc-info span {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .72rem; color: #9A9288;
    }
    .ag-svc-del {
      width: 28px; height: 28px; border-radius: 7px;
      background: #FFF0EE; border: 1px solid #F5CECA;
      color: #A83220; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .ag-svc-del:hover { background: #A83220; color: #fff; }

    /* Reserva pública */
    .rp-wrap { max-width: 560px; margin: auto; padding: 28px; }
    .rp-titulo {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.3rem; font-weight: 500; color: #0E0C09;
      margin-bottom: 20px;
    }
    .rp-dia { margin-bottom: 20px; }
    .rp-dia-label {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .75rem; font-weight: 700; color: #5A5044;
      letter-spacing: .3px; margin-bottom: 10px;
      text-transform: uppercase;
    }
    .rp-slots { display: flex; flex-wrap: wrap; gap: 8px; }
    .rp-slot {
      padding: 8px 16px; border-radius: 8px;
      border: 1.5px solid #DDD5CA; background: #fff;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .82rem; font-weight: 600; color: #0E0C09;
      cursor: pointer; transition: all .15s;
    }
    .rp-slot:hover { border-color: #9A6D1F; background: #FBF6EE; color: #9A6D1F; }
    .rp-mais { font-size: .72rem; color: #9A9288; align-self: center; }
    .rp-form-titulo {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .85rem; font-weight: 600; color: #1E6B22;
      background: #1E6B2210; border: 1px solid #1E6B2230;
      padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
    }
    .rp-input {
      width: 100%; padding: 13px 16px; margin-bottom: 10px;
      border: 1.5px solid #C4BAB0; border-radius: 10px;
      background: #fff; font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .9rem; color: #0E0C09; outline: none;
      transition: border-color .15s;
    }
    .rp-input:focus { border-color: #9A6D1F; box-shadow: 0 0 0 3px rgba(154,109,31,.15); }
    .rp-btn-confirmar {
      width: 100%; padding: 14px; border-radius: 10px;
      background: #9A6D1F; color: #fff;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .85rem; font-weight: 600;
      border: none; cursor: pointer; margin-bottom: 10px;
      transition: all .18s; letter-spacing: .3px;
    }
    .rp-btn-confirmar:hover { background: #BF8E3A; }
    .rp-btn-confirmar:disabled { opacity: .5; cursor: not-allowed; }
    .rp-btn-voltar {
      width: 100%; padding: 11px; border-radius: 10px;
      background: #F8F5F0; color: #5A5044;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .82rem; border: 1px solid #DDD5CA;
      cursor: pointer; transition: all .15s;
    }
    .rp-btn-voltar:hover { background: #EEE9E1; }


    /* ── PWA Install Banner ─────────────────────────────────────────────────── */
    #pwa-banner {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9000; width: calc(100% - 32px); max-width: 420px;
      background: #1A1715; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.07);
      display: flex; align-items: center; gap: 14px; padding: 16px 18px;
      animation: slideUpBanner .42s cubic-bezier(.22,1,.36,1) both;
      backdrop-filter: blur(20px);
    }
    @keyframes slideUpBanner {
      from { opacity:0; transform: translateX(-50%) translateY(32px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    .pwa-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg,#2C2420,#3A2E1F);
      border: 1px solid rgba(154,109,31,.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', Georgia, serif; font-size: 1.5rem;
      color: #9A6D1F; flex-shrink: 0;
    }
    .pwa-text { flex: 1; min-width: 0; }
    .pwa-text strong {
      display: block;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .85rem; font-weight: 700; color: #F8F5F0;
      margin-bottom: 2px;
    }
    .pwa-text span {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .72rem; color: rgba(248,245,240,.5);
      line-height: 1.4;
    }
    .pwa-install-btn {
      flex-shrink: 0; padding: 9px 18px; border-radius: 10px;
      background: linear-gradient(135deg,#9A6D1F,#BF8E3A);
      color: #fff; border: none; cursor: pointer;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .78rem; font-weight: 700;
      letter-spacing: .3px; transition: all .18s;
      box-shadow: 0 4px 16px rgba(154,109,31,.4);
    }
    .pwa-install-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(154,109,31,.5); }
    .pwa-dismiss {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: rgba(255,255,255,.3);
      cursor: pointer; font-size: .85rem; line-height: 1;
      padding: 4px; transition: color .15s;
    }
    .pwa-dismiss:hover { color: rgba(255,255,255,.7); }

    /* ── Navbar melhorias ───────────────────────────────────────────────────── */
    .nav-logo-word {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.35rem; font-weight: 500;
      color: #0E0C09; letter-spacing: -0.5px;
      line-height: 1;
    }
    .nav-logo-word em { color: #9A6D1F; font-style: italic; }
    .nav-save-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .65rem; font-weight: 600;
      transition: all .22s;
    }
    .nav-save-pill.saving { background: #FBF6EE; color: #9A6D1F; }
    .nav-save-pill.saved  { background: #1E6B2212; color: #1E6B22; }
    .nav-save-pill.error  { background: #A8322010; color: #A83220; }

    /* ── Hero refinado ──────────────────────────────────────────────────────── */
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(154,109,31,.12); border: 1px solid rgba(154,109,31,.25);
      padding: 6px 14px; border-radius: 20px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .68rem; font-weight: 700; letter-spacing: 2px;
      color: #BF8E3A; margin-bottom: 20px;
    }
    .hero-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #9A6D1F; animation: pulse 2s infinite; }

    /* ── Card de salão melhorado ────────────────────────────────────────────── */
    .salon-card {
      background: #fff; border-radius: 16px;
      border: 1.5px solid #DDD5CA;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      cursor: pointer; overflow: hidden;
      transition: all .24s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column;
    }
    .salon-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(0,0,0,.13);
      border-color: #C4BAB0;
    }
    .salon-card.selected {
      border-color: #9A6D1F;
      box-shadow: 0 0 0 3px rgba(154,109,31,.16), 0 12px 36px rgba(0,0,0,.10);
    }
    .salon-card-accent { height: 4px; width: 100%; }
    .salon-card-body { padding: 18px 18px 14px; flex: 1; }
    .salon-card-footer {
      padding: 12px 18px; border-top: 1px solid #F0EDE8;
      display: flex; gap: 8px;
    }
    .salon-name {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem; font-weight: 500; color: #0E0C09;
      margin-bottom: 2px; line-height: 1.3;
    }
    .salon-type {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: .68rem; color: #9A9288; letter-spacing: .3px;
      margin-bottom: 10px;
    }
    .salon-rating {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;

    #pwa-banner {

      pointer-events: none;

      display: flex; align-items: center; gap: 10px;

<body>

  <div id="app-loading">
    <div class="logo">Beleza <em>Já</em></div>
    <div class="ring"></div>

  </div>

  <div id="root"></div>

  <script type="text/babel" data-presets="react">

    const { useState, useRef, useEffect, useReducer, useCallback, useMemo, lazy, Suspense } = React;

    /*
     * ╔══════════════════════════════════════════════════════════════════╗
     * ║  CORREÇÕES APLICADAS — Beleza Já                               ║
     * ╠══════════════════════════════════════════════════════════════════╣
     * ║  #1  API Key: comentário expandido com checklist de produção    ║
     * ║  #3  Admin: botão oculto por ADMIN_UIDS + guard no render       ║
     * ║  #5  Auto-save: unificado em uma única escrita (sem race cond.) ║
     * ║  #6  ownerEmail: validado com validateEmail() no step 3         ║
     * ║  #7  uid() fallback: UUID v4 válido com hifens                  ║
     * ║  #8  ALLOWED_IMAGE_TYPES: removido gif (inconsistência)         ║
     * ║  #9  Timer de save: cleanup no unmount do componente            ║
     * ║  #11 CNPJ: cooldown de 60s após consulta (rate limit)           ║
     * ║  #12 restoreDraft: filtra chaves pelo schema do INITIAL_FORM    ║
     * ╠══════════════════════════════════════════════════════════════════╣
     * ║  PENDENTE (requer backend):                                     ║
     * ║  #2  OTP: preencher CLOUD_FN_URL para gerar no servidor         ║
     * ║  #1  API Key: restringir por domínio no Google Cloud Console    ║
     * ║  #3  Firestore Security Rules: configurar antes de publicar     ║
     * ╚══════════════════════════════════════════════════════════════════╝
     */

    // ── Remove loading screen ──────────────────────────────────────────────────
    function removeLoader() {
      const el = document.getElementById("app-loading");
      if (el) { el.classList.add("hidden"); setTimeout(() => el.remove(), 400); }
    }
    // Fix: fallback timeout para evitar loading screen presa se Firebase falhar
    setTimeout(removeLoader, 3000); // fallback: remove loading screen após 3s mesmo sem Firebase

    // ════════════════════════════════════════════════════════════════════════════
    // 1. FIREBASE INIT
    // ════════════════════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey:            "AIzaSyDyL0bxTfe7X2de_O-wbKn09feIIxi4TTs",
      authDomain:        "beleza-ja.firebaseapp.com",
      projectId:         "beleza-ja",
      storageBucket:     "beleza-ja.firebasestorage.app",
      messagingSenderId: "752625992317",
      appId:             "1:752625992317:web:1fac364495bbb3c110e714",
    };
    // 🔴 SEGURANÇA — OBRIGATÓRIO ANTES DE PRODUÇÃO:
    // 1. Restrinja esta API Key por domínio em: https://console.cloud.google.com/apis/credentials
    // 2. Configure Firestore Security Rules para validar autenticação e ownership.
    // 3. Configure Storage Rules para permitir upload apenas para o próprio userId.
    // 4. Preencha CLOUD_FN_URL abaixo para OTP seguro (gerado no servidor).
    // 5. Liste os UIDs de admin em ADMIN_UIDS para proteger o painel administrativo.


    // 🔐 UIDs dos administradores — preencha antes de publicar
    // Ex: const ADMIN_UIDS = ["uid-do-admin-1", "uid-do-admin-2"];
    // 🔴 SEGURANÇA: preencha com os UIDs reais dos admins antes de publicar
    // Encontre seu UID em: Firebase Console → Authentication → Users
    const ADMIN_UIDS = [];
    const isAdmin = (uid) => ADMIN_UIDS.length > 0 && ADMIN_UIDS.includes(uid);
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const db          = firebaseApp.firestore();
    // Cache offline — Firebase 10 compat deprecou enablePersistence().
    // A API moderna (FirestoreSettings.cache) só está disponível no SDK modular.
    // O Firestore compat já faz cache em memória por padrão durante a sessão.
    // Para cache persistente entre sessões, migrar para SDK modular (firebase/firestore).
    const auth        = firebaseApp.auth();
    const storage     = firebaseApp.storage();

    // ════════════════════════════════════════════════════════════════════════════
    // 2. CONSTANTS
    // ════════════════════════════════════════════════════════════════════════════
    const SERVICE_CATEGORIES = ["Cabelo","Unhas","Maquiagem","Skincare","Massagem","Depilação","Sobrancelha","Barba","Outros"];
    const PRODUCT_CATEGORIES = ["Shampoo & Condicionador","Tratamentos Capilares","Coloração","Maquiagem","Skincare","Perfumaria","Unhas","Equipamentos","Outros"];
    const STATES_BR = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

    const FRAUD_RULES = [
      { id:"cnpj",  label:"CNPJ validado",        desc:"Verificação automática na Receita Federal" },
      { id:"tel",   label:"Telefone confirmado",   desc:"Código OTP verificado" },
      { id:"email", label:"E-mail confirmado",     desc:"Código OTP verificado" },
      { id:"doc",   label:"Documentos analisados", desc:"Revisão manual em até 48h" },
      { id:"addr",  label:"Endereço verificado",   desc:"Comprovante de endereço aceito" },
    ];

    const PLAN_TYPES = [
      { id:"salao",      label:"Salão de Beleza",        icon:"💇", desc:"Cadastre serviços, horários e equipe.", color:"#C9A96E" },
      { id:"fornecedor", label:"Fornecedor / Revendedor", icon:"📦", desc:"Catálogo de produtos com estoque e preços.", color:"#79B8D4" },
      { id:"ambos",      label:"Salão + Fornecedor",      icon:"✦",  desc:"Perfil completo: serviços e venda de produtos.", color:"#A67FC4" },
    ];

    // EmailJS — substitua pelas suas keys
    const EMAILJS_SERVICE_ID  = "SEU_SERVICE_ID";
    const EMAILJS_TEMPLATE_ID = "SEU_TEMPLATE_ID";
    const EMAILJS_PUBLIC_KEY  = "SUA_PUBLIC_KEY";

    // Cloud Functions URL (obrigatório para OTP seguro em produção)
    // VULNERABILIDADE: Com CLOUD_FN_URL vazio, OTP é gerado no cliente (inseguro).
    // Configure sua Cloud Function e preencha a URL abaixo para produção.
    const CLOUD_FN_URL = ""; // ex: "https://us-central1-beleza-ja.cloudfunctions.net"
    const OTP_IS_DEMO = !CLOUD_FN_URL; // true = modo inseguro (apenas desenvolvimento)

    // ════════════════════════════════════════════════════════════════════════════
    // 3. UTILS / HELPERS
    // ════════════════════════════════════════════════════════════════════════════
    function uid() {
      if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
      // Fallback seguro via getRandomValues — gera UUID v4 válido
      const arr = new Uint8Array(16);
      crypto.getRandomValues(arr);
      arr[6] = (arr[6] & 0x0f) | 0x40; // version 4
      arr[8] = (arr[8] & 0x3f) | 0x80; // variant bits
      const hex = Array.from(arr, b => b.toString(16).padStart(2, "0")).join("");
      return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`;
    }
    function generateOTP() {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return String(100000 + (arr[0] % 900000));
    }

    // Máscaras
    const fmtCNPJ  = v => v.replace(/\D/g,"").replace(/(\d{2})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1/$2").replace(/(\d{4})(\d)/,"$1-$2").slice(0,18);
    const fmtPhone = v => v.replace(/\D/g,"").replace(/(\d{2})(\d)/,"($1) $2").replace(/(\d{5})(\d)/,"$1-$2").slice(0,15);
    const fmtCEP   = v => v.replace(/\D/g,"").replace(/(\d{5})(\d)/,"$1-$2").slice(0,9);
    const fmtCPF   = v => v.replace(/\D/g,"").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1-$2").slice(0,14);
    const fmtPrice = v => {
      const n = v.replace(/\D/g,"");
      if (!n) return "";
      const num = parseInt(n,10)/100;
      return num.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    };

    // Validações (melhoria 5.2 — sanitização)
    function sanitizeText(v) {
      if (typeof v !== "string") return v;
      return v.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#x27;").trim();
    }
    function validateEmail(e)  { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function validateCNPJ(c) {
      const d = c.replace(/\D/g,"");
      if (d.length!==14||/^(\d)\1{13}$/.test(d)) return false;
      const calc=(s,n)=>{ let sum=0,pos=n-7; for(let i=n;i>=1;i--){sum+=parseInt(s[n-i])*pos--;if(pos<2)pos=9;} return sum%11<2?0:11-(sum%11); };
      return calc(d,12)===parseInt(d[12])&&calc(d,13)===parseInt(d[13]);
    }
    function validateCPF(c) {
      const d = c.replace(/\D/g,"");
      if (d.length!==11||/^(\d)\1{10}$/.test(d)) return false;
      const calc=(s,n)=>{ let sum=0; for(let i=0;i<n;i++) sum+=parseInt(s[i])*(n+1-i); const r=(sum*10)%11; return r===10||r===11?0:r; };
      return calc(d,9)===parseInt(d[9])&&calc(d,10)===parseInt(d[10]);
    }

    function passwordStrength(pw) {
      if (!pw) return {score:0,label:"",color:""};
      let s=0;
      if(pw.length>=8)s++;if(pw.length>=12)s++;
      if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
      if(s<=1) return {score:20,label:"Senha muito fraca",color:"#D4735A"};
      if(s===2) return {score:40,label:"Senha fraca",color:"#E8935A"};
      if(s===3) return {score:65,label:"Senha razoável",color:"#E8B86D"};
      if(s===4) return {score:85,label:"Senha boa",color:"#7DBB7D"};
      return {score:100,label:"Senha forte ✓",color:"#5BAA5B"};
    }

    const ALLOWED_IMAGE_TYPES = ["image/jpeg","image/png","image/webp"];
    const ALLOWED_DOC_TYPES   = [...ALLOWED_IMAGE_TYPES,"application/pdf"];

    // ════════════════════════════════════════════════════════════════════════════
    // 4. SERVICES — camada de I/O isolada (melhoria 2.2)
    // ════════════════════════════════════════════════════════════════════════════

    // ── 4a. Firestore draft ────────────────────────────────────────────────────
    const EXCLUDED = ["password","confirmPassword","cnpjDoc","addressProof","ownerDoc","emailCode","phoneCode"];
    function cleanData(data) {
      const c = {...data};
      EXCLUDED.forEach(k=>delete c[k]);
      // Sanitiza strings (melhoria 5.2)
      for (const [k,v] of Object.entries(c)) {
        if (typeof v === "string") c[k] = sanitizeText(v);
      }
      return c;
    }

    // Rate limit client-side para saveDraftFS: mínimo 3s entre escritas
    let _lastDraftSave = 0;
    async function saveDraftFS(userId, changedFields) {
      const now = Date.now();
      if (now - _lastDraftSave < 3000) return; // throttle 3s
      _lastDraftSave = now;
      try {
        const clean = cleanData(changedFields);
        if (Object.keys(clean).length === 0) return;
        await db.collection("drafts").doc(userId).set(
          { ...clean, _updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
      } catch(err) {
        console.warn("[Beleza Já] saveDraftFS falhou:", err.message);
        throw err; // re-throw so caller can show status
      }
    }

    async function loadDraftFS(userId) {
      try {
        const snap = await db.collection("drafts").doc(userId).get();
        if (!snap.exists) return null;
        const data = snap.data();
        delete data._updatedAt;
        return data;
      } catch(err) {
        console.warn("[Beleza Já] loadDraftFS falhou:", err.message);
        throw err;
      }
    }

    // Strip base64 previews — only keep safe URL strings (starts with https:// or empty)
    function stripBase64(photos) {
      if (!Array.isArray(photos)) return [];
      return photos
        .map(p => {
          if (typeof p === "string") { const ok = p.startsWith("https://firebasestorage.googleapis.com") || p.startsWith("https://storage.googleapis.com"); return ok ? p : null; }
          if (p && typeof p === "object") {
            const isSafeUrl = u => typeof u === "string" && (u.startsWith("https://firebasestorage.googleapis.com") || u.startsWith("https://storage.googleapis.com")); const url = (isSafeUrl(p.url) ? p.url : null) || (isSafeUrl(p.preview) ? p.preview : null);
            return url ? { ...p, preview: url, file: undefined } : null;
          }
          return null;
        })
        .filter(Boolean);
    }

    // Validate that all services have a valid price before submit
    function validateServicesPrice(services) {
      for (const s of services) {
        if (s.priceType === "range") {
          const mn = parseFloat((s.priceMin||"0").replace(",","."));
          const mx = parseFloat((s.priceMax||"0").replace(",","."));
          if (!s.priceMin || !s.priceMax || mx <= 0) return `Serviço "${s.name}" precisa de preço mínimo e máximo`;
          if (mx <= mn) return `Serviço "${s.name}": preço máximo deve ser maior que o mínimo`;
        } else {
          if (!s.price || parseFloat((s.price||"0").replace(",",".")) <= 0) return `Serviço "${s.name}" precisa de preço`;
        }
      }
      return null;
    }

    async function submitToFirestore(userId, formData, services, products, protocol, salonPhotosRaw) {
      // Fix #3: validate all services have price
      const svcErr = validateServicesPrice(services);
      if (svcErr) throw new Error("service_price:" + svcErr);

      const clean = cleanData(formData);

      // Fix #1/#7: remove base64 from service photos — only store already-uploaded URLs
      const cleanServices = services.map(s => ({
        ...s,
        photos: stripBase64(s.photos || []),
      }));

      // Fix #8: remove base64 from salonPhotos — only URLs
      const cleanSalonPhotos = stripBase64(salonPhotosRaw || []);

      // Fix from before: remove base64 photoPreview from products
      const cleanProducts = products.map(p => {
        const { photoPreview, ...rest } = p;
        return rest;
      });

      // Verifica duplicidade de CNPJ
      const cnpjRaw = (formData.cnpj||"").replace(/\D/g,"");
      if (cnpjRaw) {
        const existing = await db.collection("establishments").where("cnpjRaw","==",cnpjRaw).where("status","in",["pending_review","approved"]).get();
        const conflict = existing.docs.find(d => d.id !== userId);
        if (conflict) throw new Error("cnpj_duplicate");
      }
      await db.collection("establishments").doc(userId).set({
        ...clean, cnpjRaw,
        services: cleanServices,
        products: cleanProducts,
        salonPhotos: cleanSalonPhotos,
        protocol,
        status:    "pending_review",
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      try { await db.collection("drafts").doc(userId).delete(); } catch {}
    }

    // ── 4b. Firebase Storage upload (melhoria 1.2) ─────────────────────────────
    async function uploadFile(file, userId, fieldName, onProgress) {
      // Sanitiza extensão — evita path traversal e extensões maliciosas
      const rawExt = (file.name.split(".").pop() || "bin").toLowerCase().replace(/[^a-z0-9]/g,"");
      const SAFE_EXTS = {
        "image/jpeg":"jpg","image/png":"png","image/webp":"webp",
        "application/pdf":"pdf"
      };
      const ext  = SAFE_EXTS[file.type] || rawExt || "bin";
      const path = `establishments/${userId}/${fieldName}_${Date.now()}.${ext}`;
      const ref  = storage.ref(path);
      const task = ref.put(file, { contentType: file.type });
      return new Promise((resolve, reject) => {
        task.on("state_changed",
          snap => onProgress?.(Math.round(snap.bytesTransferred/snap.totalBytes*100)),
          reject,
          async () => resolve(await task.snapshot.ref.getDownloadURL())
        );
      });
    }

    // ── 4c. CNPJ service (melhoria 2.2 + 3.2) ─────────────────────────────────
    async function fetchCNPJ(cnpj) {
      const raw = cnpj.replace(/\D/g,"");
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 10000); // timeout 10s
      let res;
      try {
        res = await fetch(`https://publica.cnpj.ws/cnpj/${raw}`, { signal: ctrl.signal });
      } catch(e) {
        if (e.name === "AbortError") throw new Error("timeout");
        throw e;
      } finally { clearTimeout(timer); }
      if (res.status === 404) throw new Error("not_found");
      if (res.status === 429) throw new Error("rate_limit");
      if (!res.ok) throw new Error(`api_error:${res.status}`);
      const data = await res.json();
      const s = (data.situacao_cadastral?.descricao||"").toUpperCase();
      if (s !== "ATIVA") throw new Error("inactive:" + (data.situacao_cadastral?.descricao||"irregular"));
      return data;
    }

    // Sugestão de serviços por CNAE (melhoria 3.3)
    function suggestByCNAE(cnaeDesc="") {
      const d = cnaeDesc.toLowerCase();
      if (d.includes("salão")||d.includes("cabeleir")||d.includes("beleza"))
        return ["Corte feminino","Corte masculino","Escova","Progressiva","Coloração","Mechas"];

      if (d.includes("unhas")||d.includes("manicure"))
        return ["Manicure","Pedicure","Alongamento de unhas","Esmaltação em gel","Nail art"];
      if (d.includes("estética")||d.includes("skincare")||d.includes("pele"))
        return ["Limpeza de pele","Hidratação facial","Peeling","LED terapia"];
      if (d.includes("depilação"))
        return ["Depilação com cera","Depilação a laser"];
      if (d.includes("massagem")||d.includes("spa"))
        return ["Massagem relaxante","Massagem modeladora","Drenagem linfática"];
      return [];
    }

    // ── 4d. OTP service (melhoria 1.3) ────────────────────────────────────────
    // OTP armazenado em memória com expiração — fallback seguro para demo.
    // Em produção: use CLOUD_FN_URL para gerar/validar no backend.
    const _otpStore = {};

    async function sendOTP(type, target, userId, idToken) {
      if (CLOUD_FN_URL) {
        // Produção: Cloud Function (melhoria 1.3)
        const res = await fetch(`${CLOUD_FN_URL}/sendOTP`, {
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":`Bearer ${idToken}`},
          body:JSON.stringify({type,target,userId}),
        });
        if (!res.ok) { const {error}=await res.json().catch(()=>({})); throw new Error(error||"Erro"); }
        return;
      }
      // Demo: gera OTP local
      const otp = generateOTP();
      // Chave baseada em target (email/phone) para funcionar antes do login
      const storeKey = `${type}:${userId !== "demo" ? userId : target}`;
      _otpStore[storeKey] = { otp, exp: Date.now() + 10*60*1000 };

      if (type === "email") {
        try {
          if (!window.emailjs) {
            await new Promise((r,j)=>{
              const s=document.createElement("script");
              s.src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
              s.onload=r; s.onerror=j; document.head.appendChild(s);
            });
            window.emailjs.init({publicKey:EMAILJS_PUBLIC_KEY});
          }
          await window.emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{to_email:target,otp_code:otp,business_name:"Beleza Já"});
          return { sent:true };
        } catch {
          // EmailJS não configurado — devolve código para toast demo
          return { demo:true, otp };
        }
      }
      // SMS demo — nunca expõe OTP em produção
      if (window.location.hostname !== "localhost") {
        console.warn("[DEMO OTP SMS - apenas dev] Código:", otp);
        return { demo:true };
      }
      return { demo:true, otp };
    }

    function verifyOTPLocal(type, userId, code, target) {
      // Usa target como fallback quando userId ainda é "demo" (não logado)
      const key = `${type}:${userId !== "demo" ? userId : target}`;
      const entry = _otpStore[key];
      if (!entry || Date.now() > entry.exp) return false;
      if (entry.otp !== code) return false;
      delete _otpStore[key];
      return true;
    }

    async function verifyOTPCloud(type, userId, code, idToken) {
      const res = await fetch(`${CLOUD_FN_URL}/verifyOTP`, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${idToken}`},
        body:JSON.stringify({type,userId,code}),
      });
      return res.ok;
    }

    // ── 4e. Progresso por campos (melhoria 3.1) ────────────────────────────────
    const PROGRESS_FIELDS = [
      {key:"businessName", w:3},{key:"cnpj",         w:3},{key:"cnpjVerified",  w:5},
      {key:"email",        w:2},{key:"phone",         w:2},{key:"emailVerified", w:8},
      {key:"phoneVerified",w:8},{key:"cep",           w:2},{key:"street",        w:2},
      {key:"number",       w:1},{key:"city",          w:1},{key:"ownerName",     w:3},
      {key:"ownerEmail",   w:2},{key:"password",      w:3},{key:"acceptTerms",   w:2},
      // Documentos: aceita File local OU URL no Storage
      {key:"ownerDoc",     w:5, alt:"ownerDocUrl"},
      {key:"addressProof", w:5, alt:"addressProofUrl"},
    ];
    const TOTAL_W = PROGRESS_FIELDS.reduce((s,f)=>s+f.w,0);

    function calcProgress(data) {
      let earned=0, filled=0;
      for (const {key,w,alt} of PROGRESS_FIELDS) {
        const v    = data[key];
        const vAlt = alt ? data[alt] : null;
        const ok = v===true
          || (typeof v==="string" && v.trim().length>0)
          || (v instanceof File)
          || (vAlt && typeof vAlt==="string" && vAlt.trim().length>0);
        if (ok) { earned+=w; filled++; }
      }
      return { pct:Math.round(earned/TOTAL_W*100), filled, total:PROGRESS_FIELDS.length };
    }

    // DocUpload com upload real para Firebase Storage (melhoria 1.2)
    function DocUpload({file,fieldName,userId,uploadedUrl,onUploaded,onError,label}){
      const ref      = useRef();
      const [pct,    setPct]    = useState(null);
      const [done,   setDone]   = useState(!!uploadedUrl);
      const [name,   setName]   = useState(uploadedUrl?"Documento enviado ✓":"");

      const handleChange = async (e) => {
        const f = e.target.files[0]; if(!f) return;
        if (!ALLOWED_DOC_TYPES.includes(f.type)) { onError?.("Formato inválido. Use PDF, JPG ou PNG."); return; }
        if (f.size > 10*1024*1024)               { onError?.("Arquivo muito grande. Máximo 10MB.");    return; }
        if (!userId) { onError?.("Você precisa estar logado para enviar documentos. O upload ocorre no envio final."); return; }
        setName(f.name); setDone(false); setPct(0);
        try {
          const url = await uploadFile(f, userId, fieldName, p=>setPct(p));
          onUploaded?.(url);
          setDone(true);
        } catch(err) {
          console.error("Upload error:", err);
          onError?.(err.code==="storage/unauthorized"
            ? "Sem permissão para enviar arquivos. Verifique as Storage Rules."
            : "Erro ao enviar. Tente novamente.");
          setName(""); setPct(null);
        } finally { setPct(null); }
      };

      const handleClick = () => {
        if (pct !== null) return; // uploading
        ref.current?.click();
      };

      return (
        <div onClick={handleClick} className="drop-zone" style={{padding:"18px",display:"flex",flexDirection:"column",gap:8,borderColor:done?"#5BAA5B":pct!==null?"#C9A96E":undefined,background:done?"#5BAA5B05":undefined,cursor:pct!==null?"wait":"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:"1.5rem"}}>{done?"✅":pct!==null?"⏳":"📄"}</div>
            <div>
              <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".78rem",color:done?"#5BAA5B":"#1A1715"}}>{name||label}</div>
              {!done&&pct===null&&<div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".65rem",color:"#9A9288"}}>{userId?"PDF, JPG ou PNG · máx 10MB":"Selecione o arquivo — será enviado após login"}</div>}
              {done&&<div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontSize:".65rem",color:"#5BAA5B"}}>✓ Salvo no Firebase Storage</div>}
            </div>
          </div>
          {pct!==null&&(
            <div className="upload-bar">
              <div className="upload-fill" style={{width:`${pct}%`}} />
            </div>
          )}
          <input ref={ref} type="file" accept="image/jpeg,image/png,image/webp,application/pdf" onChange={handleChange} style={{display:"none"}} />
        </div>
      );
    }

    function ServiceEditor({services,setServices,showToast,suggestedServices=[]}){
      const EMPTY={name:"",category:"",duration:60,priceType:"fixed",price:"",priceMin:"",priceMax:"",description:"",photos:[],id:null};
      const [adding,setAdding]=useState(false);
      const [editId,setEditId]=useState(null);
      const [form,setForm]=useState(EMPTY);
      const photoRef=useRef();
      const formRef=useRef(null);
      const resetForm=()=>{setAdding(false);setEditId(null);setForm(EMPTY);};
      const edit=s=>{setForm({...s,photos:s.photos||[]});setEditId(s.id);setAdding(true);setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),60);};
      const remove=id=>setServices(p=>p.filter(s=>s.id!==id));

      const addSuggested=name=>{
        setServices(p=>[...p,{...EMPTY,name,id:uid(),category:"Cabelo"}]);
        showToast(`"${name}" adicionado — complete o preço`,"info");
      };

      const handlePhotos=e=>{
        const files=Array.from(e.target.files||[]);
        const current=form.photos||[];
        if(current.length+files.length>5){showToast("Máx 5 fotos por serviço","error");return;}
        files.forEach(f=>{
          if(!ALLOWED_IMAGE_TYPES.includes(f.type)){showToast("Use JPG, PNG ou WebP","error");return;}
          if(f.size>5*1024*1024){showToast("Máx 5MB por foto","error");return;}
          const reader=new FileReader();
          reader.onload=ev=>setForm(p=>({...p,photos:[...(p.photos||[]),{id:uid(),preview:ev.target.result}]}));
          reader.readAsDataURL(f);
        });
        e.target.value="";
      };

      const movePhoto=(pid,dir)=>setForm(p=>{
        const arr=[...(p.photos||[])];
        const idx=arr.findIndex(ph=>ph.id===pid);
        const to=idx+dir;
        if(to<0||to>=arr.length)return p;
        [arr[idx],arr[to]]=[arr[to],arr[idx]];
        return {...p,photos:arr};
      });

      const save=()=>{
        if(!form.name.trim()){showToast("Nome do serviço obrigatório","error");return;}
        if(form.priceType==="fixed"&&!form.price){showToast("Informe o preço do serviço","error");return;}
        if(form.priceType==="range"&&(!form.priceMin||!form.priceMax)){showToast("Informe os preços mínimo e máximo","error");return;}
        if(form.priceType==="range"){
          const mn=parseFloat((form.priceMin||"0").replace(",","."));
          const mx=parseFloat((form.priceMax||"0").replace(",","."));
          if(mx<=mn){showToast("Preço máximo deve ser maior que o mínimo","error");return;}
        }
        // Fix #12: validate duration
        const dur=parseInt(form.duration,10);
        if(isNaN(dur)||dur<5||dur>480){showToast("Duração deve ser entre 5 e 480 minutos","error");return;}
        const entry={...form,duration:dur,id:editId||uid()};
        if(editId) setServices(p=>p.map(s=>s.id===editId?entry:s));
        else setServices(p=>[...p,entry]);
        resetForm(); showToast(editId?"Serviço atualizado ✓":"Serviço adicionado ✓","success");
      };

      const fmtServicePrice=s=>{
        if(s.priceType==="range") return `R$ ${parseFloat((s.priceMin||"0").replace(",",".")).toFixed(2)} – R$ ${parseFloat((s.priceMax||"0").replace(",",".")).toFixed(2)}`;
        return `R$ ${parseFloat((s.price||"0").replace(",",".")).toFixed(2)}`;
      };

      const existingNames=services.map(s=>s.name);
      const pendingSuggestions=suggestedServices.filter(s=>!existingNames.includes(s));

      return(
        <div style={{background:"#fff",border:"1.5px solid #DDD5CA",borderRadius:18,padding:"28px",marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05)"}}>

            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,borderRadius:12,background:"linear-gradient(135deg,#0E0C09 0%,#1E1A13 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",boxShadow:"0 2px 8px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05)"}}>✂️</div>
              <div>
                <div style={{fontFamily:"'Lora', Georgia, serif",fontSize:"1.375rem",fontWeight:400,color:"#0E0C09",lineHeight:1}}>Serviços</div>
                {services.length>0&&<div style={{fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",fontSize:".75rem",color:"#5A5044",marginTop:2,fontWeight:500}}>{services.length} cadastrado{services.length>1?"s":""}</div>}
              </div>
            </div>
            <button onClick={()=>{resetForm();setAdding(true);setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),60);}}
              className="btn btn-primary"
              style={{padding:"10px 20px",borderRadius:10,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:"1rem",fontWeight:300}}>+</span> ADICIONAR

          </div>

          {/* CNAE suggestions */}
          {pendingSuggestions.length>0&&(
